<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#061828">
<title>SCKR Regatta 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Libre+Baskerville:wght@400;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --bg:#061828; --bg2:#0d2540; --bg3:#163555;
  --acc:#C8A84B; --acc2:#E2C46A; --acc3:#8C7030;
  --teal:#1AABA0; --green:#1A8A50; --red:#C0392B; --orange:#e67e22;
  --wh:#F5F0E8; --off:#C8BFA8; --mut:#5A7899;
  --bdr:rgba(200,168,75,.22); --bdr2:rgba(200,168,75,.10);
  --fd:'Barlow Condensed',sans-serif; --fs:'Libre Baskerville',serif; --fb:'Barlow',sans-serif;
  --r:8px; --r2:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{font-family:var(--fb);background:var(--bg);color:var(--wh);max-width:520px;margin:0 auto;min-height:100dvh;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(ellipse 100% 60% at 50% 0%,rgba(22,53,85,.9),transparent 65%),repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(200,168,75,.04) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(200,168,75,.04) 40px);}
button,input,select,textarea{font-family:var(--fb);color:inherit;-webkit-appearance:none}
.leaflet-container{background:#0a1e38!important}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#03101e,#061828);border-bottom:1px solid var(--acc3);padding-top:env(safe-area-inset-top)}
.hdr-top{display:flex;align-items:center;gap:12px;padding:11px 16px}
.hdr-logo{width:40px;height:40px;flex-shrink:0;border-radius:50%;border:1.5px solid var(--acc3);display:flex;align-items:center;justify-content:center;background:var(--bg2)}
.hdr-text{flex:1;min-width:0}
.hdr-text .club{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--acc3);line-height:1}
.hdr-text .title{font-family:var(--fs);font-size:15px;font-weight:700;color:var(--wh);line-height:1.25}
.hdr-link{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--acc);background:rgba(200,168,75,.12);border:1px solid var(--bdr);border-radius:4px;padding:5px 9px;cursor:pointer;text-decoration:none}

/* TABS */
.tabs{display:grid;grid-template-columns:repeat(7,1fr)}
.tab{background:transparent;border:none;border-top:2px solid transparent;color:var(--mut);font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:9px 2px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.tab svg{width:16px;height:16px;fill:currentColor}
.tab.active{color:var(--acc);border-top-color:var(--acc)}

.tabbar-fixed{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:rgba(3,16,30,.95);backdrop-filter:blur(20px);border-top:1px solid var(--acc3);z-index:50;padding-bottom:env(safe-area-inset-bottom)}

/* SCREENS */
.screen{padding:16px 14px calc(100px + env(safe-area-inset-bottom));display:none}
.screen.active{display:block}
.shead{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bdr2)}
.shead h2{font-family:var(--fd);font-weight:800;font-size:24px}
.lxs{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--acc3)}

/* PANEL */
.pnl{background:rgba(13,37,64,.75);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:12px;backdrop-filter:blur(8px)}
.phd{padding:9px 16px;background:rgba(200,168,75,.07);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px}
.phd::before{content:'';width:2px;height:12px;background:var(--acc);border-radius:2px}
.phd-t{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc)}

/* BUTTONS */
.btn{width:100%;padding:14px;border-radius:var(--r);border:none;font-family:var(--fd);font-size:16px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.btn:active{opacity:.82}
.btn-gold{background:linear-gradient(135deg,var(--acc2),var(--acc),var(--acc3));color:var(--bg)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-ghost{background:transparent;color:var(--acc);border:1px solid var(--bdr);font-size:14px}

/* TIMER DISPLAY */
.timer-hero{background:linear-gradient(180deg,#03101e,#0d2340);border:1px solid var(--bdr);border-radius:var(--r2);padding:32px 20px 24px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.timer-status{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--acc3);margin-bottom:8px}
.timer-mmss{font-family:var(--fd);font-size:96px;font-weight:900;line-height:1;color:var(--acc2);font-variant-numeric:tabular-nums;letter-spacing:-.04em;text-shadow:0 0 40px rgba(200,168,75,.5);margin-bottom:8px}
.timer-mmss.warn{color:var(--orange);text-shadow:0 0 40px rgba(230,126,34,.6)}
.timer-mmss.danger{color:var(--red);text-shadow:0 0 40px rgba(192,57,43,.7)}
.timer-flag-name{font-family:var(--fd);font-size:13px;font-weight:600;color:var(--off);letter-spacing:.06em}

/* FLAG DISPLAY */
.flag-disp{margin:14px auto 0;display:flex;align-items:center;justify-content:center;gap:12px}
.flag-svg{width:60px;height:42px;border:2px solid #03101e;box-shadow:0 4px 16px rgba(0,0,0,.5);border-radius:2px}
.flag-info{text-align:left}
.flag-letter{font-family:var(--fd);font-size:32px;font-weight:900;color:var(--acc2);line-height:1}
.flag-meaning{font-size:12px;color:var(--mut);margin-top:2px}

/* TIMER CONTROLS */
.timer-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}

/* FLAG GRID */
.flag-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px}
.flag-card{background:rgba(13,37,64,.7);border:1px solid var(--bdr2);border-radius:8px;padding:10px;cursor:pointer;display:flex;align-items:center;gap:10px}
.flag-card:active{border-color:var(--acc)}
.flag-card .flag-svg{width:44px;height:30px;flex-shrink:0}
.flag-card-info{flex:1;min-width:0}
.flag-card-letter{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--acc2);line-height:1}
.flag-card-name{font-size:11px;color:var(--mut);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* PLACEHOLDER PANELS */
.coming-soon{padding:40px 20px;text-align:center}
.coming-soon-icon{font-size:48px;opacity:.2;margin-bottom:10px}
.coming-soon-title{font-family:var(--fd);font-size:18px;font-weight:700;letter-spacing:.06em;color:var(--acc2);margin-bottom:6px}
.coming-soon-text{font-size:13px;color:var(--mut);line-height:1.6}

/* GROUP TITLE */
.group-title{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);padding:10px 14px 4px}

/* SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:900;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.sheet-bg.open{display:flex}
.sheet{background:#0a1e38;border:1px solid var(--bdr);border-bottom:none;width:100%;max-width:520px;max-height:92dvh;border-radius:20px 20px 0 0;padding:20px 14px calc(28px + env(safe-area-inset-bottom));overflow-y:auto;animation:su .28s cubic-bezier(.2,.8,.3,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes buoyPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.85}}
.buoy-pulse{animation:buoyPulse 1.5s ease-in-out infinite}
.sheet-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bdr2)}
.sheet-hd h3{font-family:var(--fd);font-size:18px;font-weight:800;letter-spacing:.04em}
.sheet-close{border:1px solid var(--bdr2);background:rgba(255,255,255,.05);color:var(--mut);font-size:12px;cursor:pointer;padding:5px 12px;border-radius:6px;font-weight:600;font-family:var(--fd);letter-spacing:.05em}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--bdr);color:var(--wh);padding:10px 20px;border-radius:8px;font-family:var(--fd);font-size:14px;font-weight:600;z-index:1000;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1}

/* FLAG DETAIL IN SHEET */
.flag-detail{padding:20px 14px;text-align:center}
.flag-detail .flag-svg-big{width:160px;height:110px;margin:0 auto 16px;border:2px solid #03101e;box-shadow:0 8px 32px rgba(0,0,0,.6);border-radius:3px}
.flag-detail-letter{font-family:var(--fd);font-size:36px;font-weight:900;color:var(--acc2);margin-bottom:4px}
.flag-detail-name{font-family:var(--fb);font-size:14px;color:var(--mut);margin-bottom:14px;letter-spacing:.04em}
.flag-detail-meaning{font-size:15px;line-height:1.5;color:var(--off);text-align:left;background:rgba(200,168,75,.05);border-left:3px solid var(--acc);padding:12px 14px;border-radius:0 6px 6px 0}

/* IDLE MSG */
.idle-msg{padding:24px 16px;text-align:center;color:var(--mut);font-size:13px;line-height:1.7}

/* LANDSCAPE */
@media(orientation:landscape) and (max-height:500px){
  body{max-width:100%}
  .hdr{position:fixed;top:0;left:0;bottom:0;width:64px;border-right:1px solid var(--acc3);border-bottom:none;padding-top:env(safe-area-inset-top)}
  .hdr-top{flex-direction:column;padding:12px 8px;gap:8px}
  .hdr-text{display:none}
  .tabs{grid-template-columns:1fr;grid-template-rows:repeat(7,1fr)}
  .tab{border-top:none;border-left:2px solid transparent;padding:8px 6px}
  .tab.active{border-left-color:var(--acc);border-top-color:transparent}
  .screen{margin-left:64px;padding:14px 12px 80px}
  .tabbar-fixed{display:none}
  .timer-mmss{font-size:72px}
  .flag-grid{grid-template-columns:repeat(4,1fr)}
}

/* ═══ RACE MODE STYLES (Sonne-tauglich, beide Formate) ═══ */

#race { padding: 8px 8px calc(80px + env(safe-area-inset-bottom)) }

.race-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px }
.race-status { display:flex; gap:8px; flex:1; align-items:center }
.race-status-item { display:inline-flex; align-items:center; gap:5px; font-family:var(--fd); font-size:11px; font-weight:700; letter-spacing:.08em; color:var(--mut) }
.race-status-btn { background:rgba(200,168,75,.15); border:1px solid var(--bdr); color:var(--acc2); font-family:var(--fd); font-size:11px; font-weight:700; letter-spacing:.06em; padding:5px 10px; border-radius:5px; cursor:pointer }
.race-fullscreen-btn { background:transparent; border:1px solid var(--bdr2); color:var(--acc); width:30px; height:30px; border-radius:6px; cursor:pointer; font-size:16px; font-weight:bold }
.dot { width:8px; height:8px; border-radius:50%; background:var(--mut) }
.dot.dot-on { background:#4ecf88; box-shadow:0 0 6px #4ecf88 }

/* Timer banner über allem wenn aktiv */
.race-timer-banner { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; background:linear-gradient(135deg,rgba(200,168,75,.15),rgba(200,168,75,.05)); border:2px solid var(--acc); border-radius:12px; margin-bottom:10px }
.race-timer-banner.warn { background:linear-gradient(135deg,rgba(230,126,34,.18),rgba(230,126,34,.08)); border-color:#e67e22 }
.race-timer-banner.danger { background:linear-gradient(135deg,rgba(192,57,43,.22),rgba(192,57,43,.1)); border-color:#C0392B; animation:pulseBorder 1s infinite }
@keyframes pulseBorder { 0%,100% { box-shadow:0 0 0 0 #C0392B } 50% { box-shadow:0 0 0 4px rgba(192,57,43,.4) } }
.race-timer-label { font-family:var(--fd); font-size:14px; font-weight:800; letter-spacing:.12em; color:var(--acc2); text-transform:uppercase }
.race-timer-banner.warn .race-timer-label { color:#e67e22 }
.race-timer-banner.danger .race-timer-label { color:#fff }
.race-timer-value { font-family:var(--fd); font-size:42px; font-weight:900; color:var(--acc2); font-variant-numeric:tabular-nums; letter-spacing:-.02em; line-height:1 }
.race-timer-banner.warn .race-timer-value { color:#e67e22 }
.race-timer-banner.danger .race-timer-value { color:#fff; text-shadow:0 0 20px rgba(255,255,255,.5) }

/* Haupt-Grid: Tonne + Kompass */
.race-main { display:grid; grid-template-columns:1fr auto; gap:10px; margin-bottom:10px }
.race-buoy { background:rgba(13,37,64,.85); border:2px solid var(--bdr); border-left:5px solid var(--acc); border-radius:12px; padding:14px; display:flex; align-items:center; gap:14px; min-height:130px }
.race-buoy-arrow { width:54px; height:54px; flex-shrink:0; transition:transform .25s ease-out; filter:drop-shadow(0 0 8px rgba(255,255,255,.3)) }
.race-buoy-info { flex:1; min-width:0 }
.race-buoy-name { font-family:var(--fd); font-size:14px; font-weight:800; letter-spacing:.04em; line-height:1.1; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.race-buoy-dist { font-family:var(--fd); font-size:48px; font-weight:900; color:var(--acc2); font-variant-numeric:tabular-nums; line-height:1; text-shadow:0 0 16px rgba(200,168,75,.4); letter-spacing:-.02em }
.race-buoy-dist .unit { font-size:18px; color:var(--acc3); margin-left:3px; font-weight:600 }
.race-buoy-bearing { font-family:var(--fd); font-size:12px; color:var(--mut); font-weight:700; letter-spacing:.08em; margin-top:2px }
.race-buoy-empty { width:100%; text-align:center; padding:14px 0 }

.race-compass { background:rgba(13,37,64,.85); border:2px solid var(--bdr); border-radius:12px; width:130px; height:130px; padding:6px; display:flex; align-items:center; justify-content:center }

/* Empfehlungs-Banner */
.race-rec { padding:14px; text-align:center; font-family:var(--fd); font-size:22px; font-weight:900; letter-spacing:.06em; border-radius:10px; margin-bottom:10px; border:2px solid; line-height:1 }
.race-rec.warn { background:rgba(255,207,64,.18); border-color:#FFCF40; color:#FFCF40; text-shadow:0 0 12px rgba(255,207,64,.4) }
.race-rec.danger { background:rgba(192,57,43,.22); border-color:#C0392B; color:#fff; text-shadow:0 0 16px rgba(192,57,43,.6); animation:pulseDanger 1.2s infinite }
.race-rec.info { background:rgba(26,171,160,.12); border-color:rgba(26,171,160,.5); color:var(--teal); font-size:15px; font-weight:700 }
@keyframes pulseDanger { 0%,100% { transform:scale(1) } 50% { transform:scale(1.02) } }

/* Werte-Reihe */
.race-values { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px }
.race-val { background:rgba(13,37,64,.85); border:2px solid var(--bdr); border-radius:10px; padding:12px 8px; text-align:center }
.race-val-num { font-family:var(--fd); font-size:42px; font-weight:900; color:var(--acc2); font-variant-numeric:tabular-nums; line-height:1; letter-spacing:-.02em; text-shadow:0 0 12px rgba(200,168,75,.3) }
.race-val-unit { font-family:var(--fd); font-size:13px; color:var(--acc3); font-weight:700; margin-top:2px }
.race-val-lbl { font-family:var(--fd); font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--off); margin-top:6px; text-transform:uppercase }

/* Kraengung */
.race-heel { background:rgba(13,37,64,.85); border:2px solid var(--bdr); border-radius:10px; padding:10px 12px; margin-bottom:10px; display:flex; align-items:center; gap:10px }
.race-heel-lbl { font-family:var(--fd); font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--off); flex-shrink:0 }

/* Schnell-Aktionen */
.race-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px }
.race-action-btn { padding:14px; background:rgba(200,168,75,.12); border:2px solid var(--bdr); color:var(--acc2); font-family:var(--fd); font-size:13px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; border-radius:10px; cursor:pointer }
.race-action-btn:active { background:rgba(200,168,75,.25) }
.race-action-active { background:rgba(26,171,160,.2); border-color:var(--teal); color:var(--teal) }

/* === FULLSCREEN MODE === */
body.race-fullscreen .hdr,
body.race-fullscreen .tabbar-fixed { display:none }
body.race-fullscreen #race { padding:8px 8px env(safe-area-inset-bottom) }

/* === LANDSCAPE OPTIMIERT === */
@media(orientation:landscape) and (max-height:500px) {
  #race { padding:6px 6px 6px 70px; max-width:100%; box-sizing:border-box }
  body.race-fullscreen #race { padding:6px }
  
  /* Drei Zeilen: Hauptgrid (Tonne+Kompass) | Empfehlung+Werte | Heel+Actions */
  .race-header { margin-bottom:4px }
  .race-main { grid-template-columns:1fr auto; gap:8px; margin-bottom:6px; min-height:calc(100dvh - 250px) }
  .race-buoy { padding:10px; min-height:auto }
  .race-buoy-dist { font-size:54px }
  .race-buoy-arrow { width:60px; height:60px }
  .race-compass { width:140px; height:140px }
  .race-rec { font-size:18px; padding:10px; margin-bottom:6px }
  .race-values { gap:6px; margin-bottom:6px }
  .race-val { padding:8px 6px }
  .race-val-num { font-size:36px }
  .race-heel { padding:6px 10px; margin-bottom:6px }
  .race-actions { gap:6px }
  .race-action-btn { padding:10px; font-size:12px }
  .race-timer-banner { padding:8px 14px; margin-bottom:6px }
  .race-timer-value { font-size:32px }
}

/* === GRÖSSERE PHONES PORTRAIT === */
@media(orientation:portrait) and (min-height:700px) {
  .race-buoy-dist { font-size:56px }
  .race-val-num { font-size:48px }
  .race-compass { width:140px; height:140px }
}

</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">
      <svg viewBox="0 0 44 44" width="40" height="40">
        <defs><radialGradient id="lg" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#163358"/><stop offset="100%" stop-color="#03101e"/></radialGradient></defs>
        <circle cx="22" cy="22" r="21" fill="url(#lg)" stroke="#C8A84B" stroke-width="1.2"/>
        <path d="M14 29 L16 34 L28 34 L30 29 Z" fill="#C8A84B" opacity=".9"/>
        <line x1="22" y1="12" x2="22" y2="29" stroke="#E2C46A" stroke-width="1.2"/>
        <path d="M22 13 L22 27 L13 27 Q16 21 22 13Z" fill="white" opacity=".92"/>
        <path d="M22 17 L22 27 L31 25 Z" fill="white" opacity=".65"/>
        <text x="22" y="41" text-anchor="middle" font-family="sans-serif" font-size="6" font-weight="900" fill="#C8A84B" letter-spacing="1">SCK</text>
      </svg>
    </div>
    <div class="hdr-text">
      <div class="club" id="club-name">Segel-Club Kruepelsee e.V.</div>
      <div class="title">Regatta 2026</div>
    </div>
    <a href="fahrtenbuch.html" class="hdr-link">Fahrtenbuch</a>
  </div>
</header>

<main id="timer"   class="screen"></main>
<main id="flags"   class="screen"></main>
<main id="chart"   class="screen"></main>
<main id="compass" class="screen"></main>
<main id="taktik"  class="screen"></main>
<main id="trimm"   class="screen"></main>
<main id="race"    class="screen active"></main>

<nav class="tabbar-fixed">
  <div class="tabs">
    <button class="tab active" id="tab-race" onclick="SCKR.core.goto('race')">
      <svg viewBox="0 0 24 24"><path d="M12 2 L 14 8 L 20 8 L 15 12 L 17 18 L 12 14 L 7 18 L 9 12 L 4 8 L 10 8 Z"/></svg>
      Race
    </button>
    <button class="tab" id="tab-timer" onclick="SCKR.core.goto('timer')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 9v4l3 2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M9 2h6"/></svg>
      Timer

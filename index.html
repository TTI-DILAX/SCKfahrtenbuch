/* -- JSON Backup -- */
SCKR.fahrtenbuch.exportJSON = function() {
  var st = SCKR.fahrtenbuch.state;
  var data = {version:2, exported:new Date().toISOString(), profile:st.profile, trips:st.trips, boats:st.boats, branding:SCKR.admin.state.branding, sponsors:SCKR.admin.state.sponsors};
  var blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "SCKR_Fahrtenbuch_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  URL.revokeObjectURL(url);
  SCKR.core.ui.toast("JSON-BACKUP HERUNTERGELADEN");
};

SCKR.fahrtenbuch.saveToFiles = function() {
  SCKR.fahrtenbuch.exportJSON();
  SCKR.core.ui.toast("TEILEN OEFFNEN UM IN ICLOUD ZU SPEICHERN");
};

SCKR.fahrtenbuch.importJSON = function(input) {
  var file = input.files[0]; if(!file) return;
  file.text().then(function(text) {
    var data = JSON.parse(text);
    if(!confirm((data.trips?data.trips.length:0)+" Fahrten importieren?")) return;
    var st = SCKR.fahrtenbuch.state;
    var added = 0;
    var promises = [];
    for(var i=0;i<(data.trips||[]).length;i++) {
      var found = false;
      for(var j=0;j<st.trips.length;j++) if(st.trips[j].id===data.trips[i].id) { found = true; break; }
      if(!found) { promises.push(SCKR.fahrtenbuch.saveTrip(data.trips[i])); added++; }
    }
    Promise.all(promises).then(function() {
      if(data.boats) { st.boats = data.boats; SCKR.core.storage.set("boats", st.boats); }
      if(data.branding) { SCKR.admin.state.branding = data.branding; SCKR.core.storage.set("admin_branding", data.branding); SCKR.admin.applyBranding(); }
      if(data.sponsors) { SCKR.admin.state.sponsors = data.sponsors; SCKR.core.storage.set("admin_sponsors", data.sponsors); SCKR.admin.renderSponsors(); }
      SCKR.core.ui.toast(added+" FAHRTEN IMPORTIERT");
      SCKR.core.goto(SCKR.core.currentTab);
    });
  }).catch(function(e){ SCKR.core.ui.toast("IMPORT-FEHLER"); });
  input.value = "";
};

/* -- Cloud Sync (JSONBin.io) -- */
SCKR.fahrtenbuch.cloud = {
  timer: null,
  sync: async function(silent) {
    var st = SCKR.fahrtenbuch.state;
    var key = st.profile.cloudApiKey, bin = st.profile.cloudBinId;
    if(!key) { if(!silent) SCKR.core.ui.toast("KEIN API-KEY"); return; }
    if(!silent) SCKR.core.ui.toast("CLOUD SYNC...");
    try {
      var data = {version:2, synced:new Date().toISOString(), profile:st.profile, trips:st.trips, boats:st.boats};
      var url = bin ? "https://api.jsonbin.io/v3/b/"+bin : "https://api.jsonbin.io/v3/b";
      var hdrs = {"Content-Type":"application/json","X-Master-Key":key};
      if(!bin) { hdrs["X-Bin-Name"]="SCKR-Fahrtenbuch"; hdrs["X-Bin-Private"]="true"; }
      var r = await fetch(url,{method:bin?"PUT":"POST",headers:hdrs,body:JSON.stringify(data)});
      if(!r.ok) throw new Error("HTTP "+r.status);
      var json = await r.json();
      var newBin = (json.metadata && json.metadata.id) || bin;
      if(newBin !== bin) { st.profile.cloudBinId = newBin; await SCKR.core.storage.set("profile", st.profile); }
      if(!silent) SCKR.core.ui.toast("CLOUD GESPEICHERT");
    } catch(e) { if(!silent) SCKR.core.ui.toast("FEHLER: "+e.message); }
  },
  load: async function() {
    var st = SCKR.fahrtenbuch.state;
    var key = st.profile.cloudApiKey, bin = st.profile.cloudBinId;
    if(!key||!bin) { SCKR.core.ui.toast("API-KEY + BIN-ID NOETIG"); return; }
    SCKR.core.ui.toast("CLOUD LADEN...");
    try {
      var r = await fetch("https://api.jsonbin.io/v3/b/"+bin+"/latest",{headers:{"X-Master-Key":key}});
      if(!r.ok) throw new Error("HTTP "+r.status);
      var json = await r.json();
      var data = json.record;
      if(!data.trips) throw new Error("Ungueltige Daten");
      if(!confirm(data.trips.length+" Fahrten aus Cloud laden?")) return;
      var added = 0;
      for(var i=0;i<data.trips.length;i++) {
        var found = false;
        for(var j=0;j<st.trips.length;j++) if(st.trips[j].id===data.trips[i].id) { found = true; break; }
        if(!found) { await SCKR.fahrtenbuch.saveTrip(data.trips[i]); added++; }
      }
      if(data.boats) { st.boats = data.boats; await SCKR.core.storage.set("boats", st.boats); }
      SCKR.core.ui.toast(added+" NEUE FAHRTEN GELADEN");
      SCKR.core.goto(SCKR.core.currentTab);
    } catch(e) { SCKR.core.ui.toast("FEHLER: "+e.message); }
  },
  startAuto: function() {
    if(SCKR.fahrtenbuch.cloud.timer) clearInterval(SCKR.fahrtenbuch.cloud.timer);
    var st = SCKR.fahrtenbuch.state;
    if(!st.profile.autoSync || !st.profile.cloudApiKey) return;
    var ms = (st.profile.syncIntervalMin||30)*60000;
    SCKR.fahrtenbuch.cloud.timer = setInterval(function(){ SCKR.fahrtenbuch.cloud.sync(true); }, ms);
  }
};

/* -- Excel Export -- */
SCKR.fahrtenbuch.exportExcel = async function() {
  SCKR.core.ui.toast("EXCEL WIRD ERZEUGT...");
  try {
    if(typeof JSZip === "undefined") {
      await new Promise(function(resolve,reject) {
        var s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
        s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    var bin = atob(XLSX_B64);
    var bytes = new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    var zip = await JSZip.loadAsync(bytes);
    var sheet = await zip.file("xl/worksheets/sheet1.xml").async("string");

    var inlCell = function(ref,s) {
      return '<c r="'+ref+'" t="inlineStr"><is><t>'+(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</t></is></c>';
    };
    var numCell = function(ref,v) { return '<c r="'+ref+'"><v>'+v+'</v></c>'; };
    var serial = function(d) { return Math.floor((new Date(d)-new Date(Date.UTC(1899,11,30)))/86400000); };
    var timeFrac = function(d) { var t=new Date(d); return (t.getUTCHours()*3600+t.getUTCMinutes()*60+t.getUTCSeconds())/86400; };
    var inject = function(xml,ref,cell) {
      var re = new RegExp('<c r="'+ref+'"[^/]*?(?:/>|>[\\s\\S]*?</c>)');
      if(re.test(xml)) return xml.replace(re,cell);
      var row = ref.replace(/[A-Z]/g,"");
      var rr = new RegExp('(<row r="'+row+'"[^>]*>[\\s\\S]*?)</row>');
      if(rr.test(xml)) return xml.replace(rr,"$1"+cell+"</row>");
      return xml;
    };

    var st = SCKR.fahrtenbuch.state;
    if(st.profile.name) sheet = inject(sheet,"C1",inlCell("C1",st.profile.name));
    if(st.profile.age) sheet = inject(sheet,"C2",numCell("C2",st.profile.age));

    var sorted = st.trips.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);}).slice(0,50);
    for(var j=0;j<sorted.length;j++) {
      var t = sorted[j], r = 6+j;
      sheet = inject(sheet,"B"+r,numCell("B"+r,serial(t.date)));
      var cls = [t.boatClass,t.sailNumber].filter(Boolean).join(" ");
      if(cls) sheet = inject(sheet,"C"+r,inlCell("C"+r,cls));
      if(t.yachtName) sheet = inject(sheet,"D"+r,inlCell("D"+r,t.yachtName));
      if(t.sailKm) sheet = inject(sheet,"E"+r,numCell("E"+r,t.sailKm));
      if(t.sailSm) sheet = inject(sheet,"F"+r,numCell("F"+r,t.sailSm));
      if(t.motorKm) sheet = inject(sheet,"G"+r,numCell("G"+r,t.motorKm));
      if(t.motorSm) sheet = inject(sheet,"H"+r,numCell("H"+r,t.motorSm));
      if(t.fernKm) sheet = inject(sheet,"I"+r,numCell("I"+r,t.fernKm));
      if(t.bridges) sheet = inject(sheet,"J"+r,numCell("J"+r,t.bridges));
      if(t.locks) sheet = inject(sheet,"L"+r,numCell("L"+r,t.locks));
      if(t.isTrailered) sheet = inject(sheet,"O"+r,numCell("O"+r,1));
      if(t.isCommunity) sheet = inject(sheet,"P"+r,numCell("P"+r,1));
      if(t.hasRegattaFn) sheet = inject(sheet,"Q"+r,numCell("Q"+r,1));
      if(t.description) sheet = inject(sheet,"S"+r,inlCell("S"+r,t.description));
      if(t.startTime) sheet = inject(sheet,"T"+r,numCell("T"+r,timeFrac(t.startTime)));
      if(t.endTime) sheet = inject(sheet,"U"+r,numCell("U"+r,timeFrac(t.endTime)));
      if(t.cloudiness) sheet = inject(sheet,"V"+r,inlCell("V"+r,t.cloudiness));
      var wind = [t.windDir,t.windForce].filter(Boolean).join(" ");
      if(wind) sheet = inject(sheet,"W"+r,inlCell("W"+r,wind));
    }
    zip.file("xl/worksheets/sheet1.xml", sheet);
    var blob = await zip.generateAsync({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "Fahrtenbuch_SCKR_"+new Date().toISOString().slice(0,10)+".xlsx";
    a.click();
    URL.revokeObjectURL(url);
    SCKR.core.ui.toast("EXCEL HERUNTERGELADEN");
  } catch(e) { SCKR.core.ui.toast("EXCEL-FEHLER: "+e.message); }
};

/* -- INIT -- */
(async function() {
  // Admin first
  await SCKR.admin.init();

  var st = SCKR.fahrtenbuch.state;
  st.seasonYear = SCKR.fahrtenbuch.seasonFor(new Date());

  var p = await SCKR.core.storage.get("profile");
  if(p) { for(var k in p) st.profile[k] = p[k]; }

  var b = await SCKR.core.storage.get("boats");
  if(b) st.boats = b;

  var keys = await SCKR.core.storage.list("trip:");
  for(var i=0;i<keys.length;i++) {
    var t = await SCKR.core.storage.get(keys[i]);
    if(t) st.trips.push(t);
  }
  st.trips.sort(function(a,b){return new Date(b.date)-new Date(a.date);});

  if(st.profile.autoSync && st.profile.cloudApiKey) SCKR.fahrtenbuch.cloud.startAuto();

  SCKR.fahrtenbuch.render.live();
})();
</script>

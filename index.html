<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#061828">
<title>SCKR Fahrtenbuch 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Libre+Baskerville:wght@400;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* == DESIGN TOKENS == */
:root{
--bg:#061828;--bg2:#0d2540;--bg3:#163555;
--acc:#C8A84B;--acc2:#E2C46A;--acc3:#8C7030;
--teal:#1AABA0;--green:#1A8A50;--red:#C0392B;
--wh:#F5F0E8;--off:#C8BFA8;--mut:#5A7899;
--bdr:rgba(200,168,75,.20);--bdr2:rgba(200,168,75,.09);
--fd:'Barlow Condensed',sans-serif;
--fs:'Libre Baskerville',serif;
--fb:'Barlow',sans-serif;
--r:8px;--r2:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{
font-family:var(--fb);background:var(--bg);color:var(--wh);
max-width:520px;margin:0 auto;min-height:100dvh;
-webkit-font-smoothing:antialiased;
background-image:
 radial-gradient(ellipse 100% 60% at 50% 0%,rgba(22,53,85,.9),transparent 65%),
 repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(200,168,75,.04) 40px),
 repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(200,168,75,.04) 40px);
}
button,input,select,textarea{font-family:var(--fb);color:inherit;-webkit-appearance:none}
a{color:var(--acc2)}
/* == HEADER == */
.hdr{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#03101e,#061828);border-bottom:1px solid var(--acc3);padding-top:env(safe-area-inset-top)}
.hdr-top{display:flex;align-items:center;gap:12px;padding:11px 16px 10px;border-bottom:1px solid var(--bdr2)}
#hdr-logo{width:44px;height:44px;flex-shrink:0;border-radius:50%;cursor:pointer;border:1.5px solid var(--acc3);filter:drop-shadow(0 0 8px rgba(200,168,75,.35));display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg2)}
#hdr-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hdr-text .club{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--acc3);line-height:1}
.hdr-text .title{font-family:var(--fs);font-size:15px;font-weight:700;color:var(--wh);line-height:1.25}
.hdr-badge{margin-left:auto;font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--acc);background:rgba(200,168,75,.12);border:1px solid var(--bdr);border-radius:4px;padding:3px 9px}
/* == TABS == */
.tabs{display:grid;grid-template-columns:repeat(4,1fr)}
.tab{background:transparent;border:none;border-top:2px solid transparent;color:var(--mut);font-family:var(--fb);font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:9px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:color .15s}
.tab .ti{font-size:18px;line-height:1}
.tab.active{color:var(--acc);border-top-color:var(--acc)}
/* == SCREENS == */
.screen{padding:16px 14px calc(28px + env(safe-area-inset-bottom));display:none}
.screen.active{display:block}
.shead{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--bdr2)}
.shead h2{font-family:var(--fd);font-weight:800;font-size:26px}
.lxs{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--acc3)}
/* == PANEL == */
.pnl{background:rgba(13,37,64,.75);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:12px;backdrop-filter:blur(8px)}
.phd{padding:9px 16px;background:rgba(200,168,75,.07);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px}
.phd::before{content:'';width:2px;height:12px;background:var(--acc);border-radius:2px}
.phd-t{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc)}
.prow{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--bdr2)}
.prow:last-child{border-bottom:none}
.prow .lv{font-size:14px;color:var(--off)}
.prow .rv{font-family:var(--fd);font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
/* == FIELDS == */
.fld{padding:10px 16px;border-bottom:1px solid var(--bdr2)}
.fld:last-child{border-bottom:none}
.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc3);margin-bottom:4px}
.inp{width:100%;border:none;background:transparent;padding:3px 0;font-size:15px;outline:none;color:var(--wh)}
.inp::placeholder{color:var(--mut)}
.inp:focus{border-bottom:1px solid var(--acc)}
textarea.inp{resize:vertical;min-height:50px}
select.inp option{background:#0d2540;color:#F5F0E8}
.g2{display:grid;grid-template-columns:1fr 1fr}
.g2 .fld:nth-child(odd){border-right:1px solid var(--bdr2)}
.ro-field{padding:10px 16px;border-bottom:1px solid var(--bdr2);display:flex;justify-content:space-between;align-items:center}
.ro-field .lbl{margin-bottom:0}
.ro-field .ro-val{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--off)}
/* == TOGGLE/SWITCH == */
.trow{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--bdr2)}
.trow:last-child{border-bottom:none}
.sw{width:46px;height:28px;background:rgba(255,255,255,.1);border-radius:100px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;display:inline-block;border:1px solid rgba(255,255,255,.12)}
.sw::after{content:'';position:absolute;top:2px;left:2px;width:22px;height:22px;background:var(--off);border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.4);transition:left .2s}
.sw.on{background:var(--green)}
.sw.on::after{left:20px}
/* == STEPPER == */
.stp{display:inline-flex;align-items:center;gap:8px;background:rgba(200,168,75,.1);border-radius:100px;border:1px solid var(--bdr);padding:3px}
.stp button{width:28px;height:28px;border-radius:50%;border:none;background:rgba(200,168,75,.2);color:var(--acc2);font-size:18px;font-weight:700;cursor:pointer;line-height:1;font-family:inherit}
.stp span{min-width:28px;text-align:center;font-weight:700;font-family:var(--fd);font-size:16px}
/* == BUTTONS == */
.btn{width:100%;padding:14px;border-radius:var(--r);border:none;font-family:var(--fd);font-size:17px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .15s}
.btn:active{opacity:.82}
.btn-gold{background:linear-gradient(135deg,var(--acc2),var(--acc),var(--acc3));color:var(--bg);box-shadow:0 4px 20px rgba(200,168,75,.3)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 4px 16px rgba(26,138,80,.35)}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--acc);border:1px solid var(--bdr);font-size:14px}
.btn-sm{padding:7px 14px;border-radius:6px;border:1px solid var(--bdr);background:rgba(200,168,75,.12);color:var(--acc2);font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
/* == BOAT CHIPS == */
.boat-chips{display:flex;gap:8px;flex-wrap:wrap;padding:12px 14px;border-bottom:1px solid var(--bdr2)}
.boat-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:100px;cursor:pointer;background:rgba(200,168,75,.1);border:1px solid var(--bdr);font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:.04em;color:var(--off);transition:all .15s}
.boat-chip.sel,.boat-chip:active{background:rgba(200,168,75,.25);border-color:var(--acc);color:var(--acc2)}
.boat-chip-add{background:transparent;border-style:dashed;color:var(--mut)}
/* == INSTRUMENT == */
.inst{background:linear-gradient(180deg,#03101e,#081b33);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:14px;box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(200,168,75,.12)}
.inst-hd{padding:12px 16px 8px;background:linear-gradient(90deg,rgba(200,168,75,.1),transparent);border-bottom:1px solid var(--bdr2);display:flex;align-items:center;justify-content:space-between}
.inst-hd-t{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--acc)}
.live-dot{width:8px;height:8px;background:var(--teal);border-radius:50%;box-shadow:0 0 8px var(--teal)}
.inst-grid{display:grid;grid-template-columns:1fr 1fr 1fr}
.inst-cell{padding:14px 10px 12px;border-right:1px solid var(--bdr2);text-align:center}
.inst-cell:last-child{border-right:none}
.inst-val{font-family:var(--fd);font-size:28px;font-weight:900;color:var(--acc2);font-variant-numeric:tabular-nums;line-height:1;text-shadow:0 0 20px rgba(200,168,75,.4)}
.inst-unit{font-size:12px;font-weight:600;color:var(--acc3);margin-left:2px}
.inst-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-top:4px}
.infra-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px 12px}
.infra-btn{padding:10px;border-radius:var(--r);cursor:pointer;font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:.05em;background:rgba(200,168,75,.1);color:var(--acc2);border:1px solid var(--bdr)}
.idle-msg{padding:24px 16px;text-align:center;color:var(--mut);font-size:13px;line-height:1.7}
/* == WEATHER STRIP == */
.wx-strip{display:flex;gap:0;border-bottom:1px solid var(--bdr2)}
.wx-item{flex:1;padding:10px 12px;text-align:center;border-right:1px solid var(--bdr2)}
.wx-item:last-child{border-right:none}
.wx-val{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--acc2)}
.wx-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-top:2px}
/* == GEO BANNER == */
.geo{padding:10px 14px;border-radius:var(--r);margin-bottom:12px;display:flex;align-items:center;gap:10px;font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:.04em}
.geo.on{background:rgba(26,138,80,.2);color:#4ecf88;border:1px solid rgba(26,138,80,.35)}
.geo.watch{background:rgba(200,168,75,.12);color:var(--acc2);border:1px solid var(--bdr)}
.geo-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}
.pulse{animation:pulse 1.4s infinite}
/* == MAP == */
.map-wrap{margin:8px 12px 4px;border-radius:var(--r);overflow:hidden;border:1px solid var(--bdr2);height:200px;position:relative;background:#03101e}
.map-wrap .leaflet-container{height:100%;width:100%;background:#03101e}
/* == TRACK SVG FALLBACK == */
.track-wrap{margin:8px 12px 4px;border-radius:var(--r);overflow:hidden;background:#03101e;border:1px solid var(--bdr2)}
/* == TRIP CARDS == */
.trip-card{display:block;width:100%;text-align:left;cursor:pointer;background:rgba(13,37,64,.6);border:1px solid var(--bdr2);border-left:3px solid var(--acc3);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px;backdrop-filter:blur(4px)}
.trip-card:active{border-left-color:var(--acc);background:rgba(13,37,64,.9)}
.tr-date{font-family:var(--fd);font-size:18px;font-weight:800}
.tr-pts{font-family:var(--fd);font-size:15px;font-weight:800;color:var(--acc);background:rgba(200,168,75,.1);border:1px solid var(--bdr);padding:2px 10px;border-radius:4px}
.tr-desc{font-size:13px;color:var(--mut);margin:5px 0 8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.chip{display:inline-flex;padding:2px 8px;background:rgba(200,168,75,.1);border:1px solid var(--bdr2);border-radius:4px;font-family:var(--fd);font-size:11px;font-weight:600;color:var(--acc3);letter-spacing:.04em}
.chip.see{background:rgba(26,171,160,.1);color:var(--teal);border-color:rgba(26,171,160,.3)}
.chip.gps{background:rgba(26,138,80,.1);color:#4ecf88;border-color:rgba(26,138,80,.3)}
/* == FILTER BAR == */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-bar select{background:rgba(200,168,75,.1);border:1px solid var(--bdr);border-radius:var(--r);color:var(--acc2);font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:.04em;padding:8px 12px;cursor:pointer}
.filter-bar select option{background:#0d2540;color:#F5F0E8}
/* == STATS == */
.hero{background:linear-gradient(160deg,#0d2340,#03101e);border:1px solid var(--bdr);border-radius:var(--r2);padding:22px 20px 18px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.hero::before{content:'SCK';position:absolute;right:-12px;top:-20px;font-family:var(--fd);font-size:110px;font-weight:900;color:rgba(200,168,75,.04);pointer-events:none}
.hero-num{font-family:var(--fd);font-size:68px;font-weight:900;line-height:1;color:var(--acc2);font-variant-numeric:tabular-nums;letter-spacing:-.02em;text-shadow:0 0 40px rgba(200,168,75,.4)}
.hero-unit{font-size:22px;font-weight:600;color:var(--acc3);margin-left:6px}
.prog{height:4px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden;margin:16px 0 7px}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--acc3),var(--acc2));transition:width .6s;box-shadow:0 0 8px rgba(200,168,75,.5)}
.badge{display:inline-flex;padding:5px 12px;border-radius:4px;font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:.06em;background:rgba(200,168,75,.15);color:var(--acc2);border:1px solid var(--bdr)}
.season-pick{display:flex;gap:4px;margin-bottom:14px;background:rgba(6,24,40,.8);border:1px solid var(--bdr2);border-radius:var(--r);padding:3px}
.season-pick button{flex:1;padding:7px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--mut);transition:all .15s}
.season-pick button.active{background:rgba(200,168,75,.15);color:var(--acc2);border:1px solid var(--bdr)}
/* == SHEET == */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:900;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.sheet-bg.open{display:flex}
.sheet{background:#0a1e38;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(200,168,75,.03) 40px);border:1px solid var(--bdr);border-bottom:none;width:100%;max-width:520px;max-height:92dvh;border-radius:20px 20px 0 0;padding:20px 14px calc(28px + env(safe-area-inset-bottom));overflow-y:auto;animation:su .28s cubic-bezier(.2,.8,.3,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bdr2)}
.sheet-close{border:1px solid var(--bdr2);background:rgba(255,255,255,.05);color:var(--mut);font-size:12px;cursor:pointer;padding:5px 12px;border-radius:6px;font-weight:600;font-family:var(--fd);letter-spacing:.05em}
/* == TOAST == */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--bdr);color:var(--wh);padding:10px 20px;border-radius:8px;font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:.04em;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.5);white-space:nowrap;max-width:90vw;text-align:center;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
/* == MISC == */
.warn{margin-bottom:10px;padding:9px 14px;border-radius:var(--r);background:rgba(200,168,75,.1);border-left:3px solid var(--acc);font-size:13px;color:var(--acc2)}
.empty{text-align:center;padding:52px 20px;color:var(--mut)}
.pts-box{background:linear-gradient(135deg,#03101e,#0d2340);border:1px solid var(--bdr);border-radius:var(--r2);padding:18px;text-align:center;margin-top:12px}
/* == RESPONSIVE == */
@media(orientation:landscape){
 body{max-width:100%}
 .tabs{position:fixed;left:0;top:0;bottom:0;width:64px;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);background:#03101e;border-right:1px solid var(--acc3);z-index:60}
 .tab{border-top:none;border-left:2px solid transparent;padding:14px 6px}
 .tab.active{border-left-color:var(--acc)}
 .hdr{margin-left:64px}
 .screen{margin-left:64px}
 .sheet{max-width:100%}
 .inst-grid{grid-template-columns:repeat(6,1fr)}
}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-top">
    <div id="hdr-logo" onclick="promptLogoUpload()" title="Logo tippen zum Aendern">
      <svg id="logo-svg" viewBox="0 0 44 44" width="44" height="44">
        <defs><radialGradient id="lg" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#163358"/><stop offset="100%" stop-color="#03101e"/></radialGradient></defs>
        <circle cx="22" cy="22" r="21" fill="url(#lg)" stroke="#C8A84B" stroke-width="1.2"/>
        <path d="M6 29 Q11 27 16 29 Q21 31 26 29 Q31 27 38 29" fill="none" stroke="#C8A84B" stroke-width="1" opacity=".7"/>
        <path d="M14 29 L16 34 L28 34 L30 29 Z" fill="#C8A84B" opacity=".9"/>
        <line x1="22" y1="12" x2="22" y2="29" stroke="#E2C46A" stroke-width="1.2"/>
        <path d="M22 13 L22 27 L13 27 Q16 21 22 13Z" fill="white" opacity=".92"/>
        <path d="M22 17 L22 27 L31 25 Z" fill="white" opacity=".65"/>
        <text x="22" y="41" text-anchor="middle" font-family="sans-serif" font-size="6" font-weight="900" fill="#C8A84B" letter-spacing="1">SCK</text>
      </svg>
      <img id="logo-img" src="" alt="" style="display:none;width:44px;height:44px;object-fit:cover;border-radius:50%">
    </div>
    <div class="hdr-text">
      <div class="club">Segel-Club Kruepelsee e.V.</div>
      <div class="title">Fahrtenbuch 2026</div>
    </div>
    <div class="hdr-badge" id="sync-badge">BSV</div>
  </div>
  <nav class="tabs">
    <button class="tab active" id="tab-live" onclick="goto('live')"><span class="ti">&#x1F4CD;</span>Live</button>
    <button class="tab" id="tab-trips" onclick="goto('trips')"><span class="ti">&#x1F4CB;</span>Fahrten</button>
    <button class="tab" id="tab-stats" onclick="goto('stats')"><span class="ti">&#x1F4CA;</span>Punkte</button>
    <button class="tab" id="tab-settings" onclick="goto('settings')"><span class="ti">&#x2699;</span>Profil</button>
  </nav>
</header>
<main id="live" class="screen active"></main>
<main id="trips" class="screen"></main>
<main id="stats" class="screen"></main>
<main id="settings" class="screen"></main>
<div class="sheet-bg" id="sheet-bg" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet-body"></div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="logo-input" accept="image/*" style="display:none" onchange="onLogoFile(this)">
<input type="file" id="json-import" accept=".json" style="display:none" onchange="importJSON(this)">

/* -- Storage -- */
var DB = {
  get: async function(k) {
    try {
      if (window.storage) { var r = await window.storage.get(k, false); return r ? JSON.parse(r.value) : null; }
      var v = localStorage.getItem("sckr_" + k); return v ? JSON.parse(v) : null;
    } catch(e) { return null; }
  },
  set: async function(k, v) {
    try {
      if (window.storage) return await window.storage.set(k, JSON.stringify(v), false);
      localStorage.setItem("sckr_" + k, JSON.stringify(v));
    } catch(e) {}
  },
  del: async function(k) {
    try {
      if (window.storage) return await window.storage.delete(k, false);
      localStorage.removeItem("sckr_" + k);
    } catch(e) {}
  },
  list: async function(prefix) {
    try {
      if (window.storage) { var r = await window.storage.list(prefix, false); return (r && r.keys) || []; }
      return Object.keys(localStorage).filter(function(k){ return k.indexOf("sckr_" + prefix) === 0; }).map(function(k){ return k.slice(5); });
    } catch(e) { return []; }
  }
};

/* -- BSV 2026 Points -- */
function pSail(t)    { return (t.sailKm||0) + (t.sailSm||0) * 1.852; }
function pMotor(t)   { return 0.2 * ((t.motorKm||0) + (t.motorSm||0) * 1.852); }
function pBridge(t)  { return (t.bridges||0) * 2; }
function pLock(t)    { return (t.locks||0) * 4; }
function pFern(t)    { var d = t.fernKm||0; return d < 200 ? 0 : 20 + Math.floor((d-200)/100)*10; }
function pTrailer(t) { return t.isTrailered ? 50 : 0; }
function pComm(t)    { return t.isCommunity ? 20 : 0; }
function pRegFn(t)   { return t.hasRegattaFn ? 25 : 0; }
function tripPts(t)  { return pSail(t)+pMotor(t)+pBridge(t)+pLock(t)+pFern(t)+pTrailer(t)+pComm(t)+pRegFn(t); }

function seasonTotals(all) {
  var s=0,m=0,br=0,lk=0,fe=0,tr=0,co=0,rf=0,bd=0,ku=0,tu=false;
  var sorted = all.slice().sort(function(a,b){ return new Date(a.date)-new Date(b.date); });
  for (var i=0; i<sorted.length; i++) {
    var t = sorted[i];
    s+=pSail(t); m+=pMotor(t); br+=pBridge(t); lk+=pLock(t); fe+=pFern(t);
    if (t.isTrailered && !tu) { tr+=50; tu=true; }
    co+=pComm(t); rf+=pRegFn(t);
    if (pSail(t)>0 || pMotor(t)>0 || t.hasRegattaFn) {
      var see = (t.sailSm||0)>0 && !(t.sailKm||0);
      if (see) { if(ku<20){ku++;bd++;} } else bd++;
    }
    if (bd>=50) break;
  }
  var bl=Math.min(200,br+lk), cr=Math.min(300,co+rf);
  return {s:s,m:m,br:br,lk:lk,bl:bl,fe:fe,tr:tr,co:co,rf:rf,cr:cr,
    total:s+m+bl+fe+tr+cr, bd:bd, ku:ku, blOver:br+lk>200, crOver:co+rf>300};
}

function seasonRange(y) { return {start:new Date(Date.UTC(y-1,10,1)), end:new Date(Date.UTC(y,9,31,23,59,59))}; }
function seasonFor(d) { var m=new Date(d).getUTCMonth(), y=new Date(d).getUTCFullYear(); return m>=10?y+1:y; }

function haversine(a,b) {
  var R=6371, r=function(x){return x*Math.PI/180;};
  return 2*R*Math.asin(Math.sqrt(Math.sin(r(b.lat-a.lat)/2)*Math.sin(r(b.lat-a.lat)/2)+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(r(b.lng-a.lng)/2)*Math.sin(r(b.lng-a.lng)/2)));
}

  };

}

}

/* -- Helpers -- */
function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtDate(d) { return new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric"}); }
function fmtTime(s) { if(s<3600) return Math.floor(s/60)+"m "+s%60+"s"; return Math.floor(s/3600)+"h "+Math.floor((s%3600)/60)+"m"; }
function fmtDist(km,cat) { if(cat==="Binnen") return km.toFixed(2)+" km"; return (km/1.852).toFixed(2)+" sm"; }
var DIRS = ["N","NNO","NO","ONO","O","OSO","SO","SSO","S","SSW","SW","WSW","W","WNW","NW","NNW"];
var BFT_LIM = [0.3,1.6,3.4,5.5,8,10.8,13.9,17.2,20.8,24.5,28.5,32.7];
function msToBft(v) { for(var i=0;i<BFT_LIM.length;i++) if(v<BFT_LIM[i]) return i; return 12; }
function degToDir(d) { return DIRS[Math.floor(((d+11.25)%360)/22.5)]; }

/* -- Toast -- */
var _tt;
function toast(msg, ms) {
  var el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(_tt); _tt=setTimeout(function(){el.classList.remove("show");}, ms||2600);
}

/* -- Navigation -- */
function goto(tab) {
  var screens = document.querySelectorAll(".screen");
  for(var i=0;i<screens.length;i++) screens[i].classList.remove("active");
  document.getElementById(tab).classList.add("active");
  var tabs = document.querySelectorAll(".tab");
  for(var j=0;j<tabs.length;j++) tabs[j].classList.remove("active");
  document.getElementById("tab-"+tab).classList.add("active");
  currentTab=tab;
  if(tab==="live") renderLive();
  else if(tab==="trips") renderTrips();
  else if(tab==="stats") renderStats();
  else if(tab==="settings") renderSettings();
}

/* -- Sheet -- */
function openSheet(html) {
  document.getElementById("sheet-body").innerHTML=html;
  document.getElementById("sheet-bg").classList.add("open");
}
function closeSheet() { document.getElementById("sheet-bg").classList.remove("open"); }

function mkSw(id,on) { return '<button class="sw'+(on?' on':'')+'" id="'+id+'" onclick="this.classList.toggle(\'on\')" type="button"></button>'; }

/* -- Route suggestions -- */
function getRouteSuggestions() {
  var fromTrips = [];
  for(var i=0; i<Math.min(trips.length,10); i++) {
    if(trips[i].description && fromTrips.indexOf(trips[i].description)===-1) fromTrips.push(trips[i].description);
  }
  var all = fromTrips.concat(defaultRoutes);
  var unique = [];
  for(var j=0;j<all.length;j++) { if(unique.indexOf(all[j])===-1) unique.push(all[j]); }
  return unique.slice(0,8);
}

function routeSuggestHTML(inputId) {
  var routes = getRouteSuggestions();

    return '<button type="button" style="padding:6px 12px;border-radius:100px;border:1px solid var(--bdr);background:rgba(200,168,75,.08);color:var(--off);font-size:12px;cursor:pointer;font-family:var(--fd);font-weight:600;white-space:nowrap" onclick="document.getElementById(\''+inputId+'\').value=this.textContent">'+esc(r)+'</button>';

  return '<div style="display:flex;gap:6px;flex-wrap:wrap;padding:8px 16px;border-bottom:1px solid var(--bdr2);overflow-x:auto">'+opts+'</div>';
}

/* -- Auto-weather fetch -- */
function fetchCurrentWeather(cb) {
  if (!navigator.geolocation) { if(cb) cb(null); return; }
  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat=pos.coords.latitude, lng=pos.coords.longitude;
    var day=new Date().toISOString().slice(0,10);
    fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lng+"&hourly=precipitation,cloud_cover,wind_speed_10m,wind_direction_10m&wind_speed_unit=ms&timezone=auto&start_date="+day+"&end_date="+day)
    .then(function(r){return r.json();})
    .then(function(d){
      var now=new Date(), bi=0, bd=Infinity;
      var times = (d.hourly&&d.hourly.time)||[];
      for(var i=0;i<times.length;i++){
        var dt=Math.abs(new Date(times[i])-now);
        if(dt<bd){bd=dt;bi=i;}
      }
      var wx = {
        windDir: degToDir(d.hourly.wind_direction_10m[bi]),
        windForce: msToBft(d.hourly.wind_speed_10m[bi])+" Bft",
        cloudiness: d.hourly.cloud_cover[bi]+" %"+(d.hourly.precipitation[bi]>0?" / "+d.hourly.precipitation[bi].toFixed(1)+" mm":"")
      };
      currentWeather = wx;
      if(cb) cb(wx);
    }).catch(function(){ if(cb) cb(null); });
  }, function(){ if(cb) cb(null); }, {enableHighAccuracy:true,timeout:10000});
}

function autoWeather() {
  toast("WETTER WIRD GELADEN...");
  fetchCurrentWeather(function(wx) {
    if(!wx) { toast("WETTER NICHT VERFUEGBAR"); return; }
    var dir=document.getElementById("w-dir");
    var bft=document.getElementById("w-bft");
    var cl=document.getElementById("w-cloud");
    if(dir) dir.value=wx.windDir;
    if(bft) bft.value=wx.windForce;
    if(cl)  cl.value=wx.cloudiness;
    toast("WETTER: "+wx.windDir+" "+wx.windForce);
  });
}

/* -- Weather for historical trip -- */
function fetchTripWeather(trip, cb) {
  var pts = trip.trackPoints;
  var lat = profile.homePortLat, lng = profile.homePortLon;
  if (pts && pts.length > 0) { var mid=pts[Math.floor(pts.length/2)]; lat=mid.lat; lng=mid.lng; }
  var st = trip.startTime || (trip.date+"T10:00:00Z");
  var et = trip.endTime || (trip.date+"T16:00:00Z");
  var midT = new Date((new Date(st).getTime()+new Date(et).getTime())/2);
  var day = trip.date;
  fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lng+"&hourly=precipitation,cloud_cover,wind_speed_10m,wind_direction_10m&wind_speed_unit=ms&timezone=UTC&start_date="+day+"&end_date="+day)
  .then(function(r){return r.json();})
  .then(function(d){
    var bi=0,bd=Infinity;
    var times=(d.hourly&&d.hourly.time)||[];
    for(var i=0;i<times.length;i++){var dt=Math.abs(new Date(times[i]+"Z")-midT);if(dt<bd){bd=dt;bi=i;}}
    trip.cloudiness = d.hourly.cloud_cover[bi]+" %"+(d.hourly.precipitation[bi]>0?" / "+d.hourly.precipitation[bi].toFixed(1)+" mm":"");
    trip.windDir = degToDir(d.hourly.wind_direction_10m[bi]);
    trip.windForce = msToBft(d.hourly.wind_speed_10m[bi])+" Bft";
    if(cb) cb(trip);
  }).catch(function(){ if(cb) cb(null); });
}

/* -- Track: Map (Leaflet) + SVG fallback -- */
var _mapInst = null;
function showMap(containerId, pts, evs) {
  if (!pts || pts.length < 2) {
    var c = document.getElementById(containerId);
    if(c) c.innerHTML = '<div style="height:200px;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:13px">KEIN GPS-TRACK</div>';
    return;
  }
  var container = document.getElementById(containerId);
  if(!container) return;
  container.innerHTML = "";
  container.style.height = "200px";
  try {
    if(typeof L !== "undefined") {
      if(_mapInst) { _mapInst.remove(); _mapInst=null; }
      _mapInst = L.map(container, {zoomControl:false, attributionControl:false}).fitBounds(
        pts.map(function(p){return [p.lat,p.lng];})
      );
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{opacity:0.7}).addTo(_mapInst);
      var coords = pts.map(function(p){return [p.lat,p.lng];});
      L.polyline(coords,{color:"#1AABA0",weight:3}).addTo(_mapInst);
      L.circleMarker(coords[0],{radius:6,color:"#1A8A50",fillColor:"#1A8A50",fillOpacity:1}).addTo(_mapInst);
      L.circleMarker(coords[coords.length-1],{radius:6,color:"#C8A84B",fillColor:"#C8A84B",fillOpacity:1}).addTo(_mapInst);
      if(evs) {
        for(var i=0;i<evs.length;i++) {
          L.circleMarker([evs[i].lat,evs[i].lng],{radius:5,color:"#E2C46A",fillColor:"#E2C46A",fillOpacity:1})
            .bindPopup(esc(evs[i].type)+" "+(evs[i].name||"")).addTo(_mapInst);
        }
      }
      setTimeout(function(){_mapInst.invalidateSize();},200);
      return;
    }
  } catch(e) {}
  // SVG fallback
  container.innerHTML = trackSVG(pts,evs);
}

function trackSVG(pts,evs) {
  if(!pts||pts.length<2) return '<div style="height:130px;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:13px">KEIN GPS-TRACK</div>';
  var lats=[],lons=[];
  for(var i=0;i<pts.length;i++){lats.push(pts[i].lat);lons.push(pts[i].lng);}
  var minLat=Math.min.apply(null,lats),maxLat=Math.max.apply(null,lats)||minLat+.001;
  var minLon=Math.min.apply(null,lons),maxLon=Math.max.apply(null,lons)||minLon+.001;
  var W=300,H=140,pad=14;
  var tx=function(lon){return pad+(lon-minLon)/(maxLon-minLon)*(W-2*pad);};
  var ty=function(lat){return H-pad-(lat-minLat)/(maxLat-minLat)*(H-2*pad);};
  var d="";
  for(var j=0;j<pts.length;j++) d+=(j===0?"M":"L")+tx(pts[j].lng).toFixed(1)+","+ty(pts[j].lat).toFixed(1);
  var dots="";
  if(evs){for(var k=0;k<evs.length;k++) dots+='<circle cx="'+tx(evs[k].lng).toFixed(1)+'" cy="'+ty(evs[k].lat).toFixed(1)+'" r="5" fill="#C8A84B" stroke="#03101e" stroke-width="1.5"/>';}
  return '<div class="track-wrap"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:140px;display:block">'
    +'<path d="'+d+'" fill="none" stroke="#1AABA0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'
    +'<circle cx="'+tx(pts[0].lng).toFixed(1)+'" cy="'+ty(pts[0].lat).toFixed(1)+'" r="5" fill="#1A8A50" stroke="#03101e" stroke-width="2"/>'
    +'<circle cx="'+tx(pts[pts.length-1].lng).toFixed(1)+'" cy="'+ty(pts[pts.length-1].lat).toFixed(1)+'" r="5" fill="#C8A84B" stroke="#03101e" stroke-width="2"/>'
    +dots+'</svg></div>';
}

/* -- Persistence -- */
async function saveTrip(t) {
  var idx = -1;
  for(var i=0;i<trips.length;i++) { if(trips[i].id===t.id){idx=i;break;} }
  if(idx>=0) trips[idx]=t; else trips.unshift(t);
  trips.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  await DB.set("trip:"+t.id, t);
}
async function deleteTrip(id) {
  await DB.del("trip:"+id);
  trips = trips.filter(function(t){return t.id!==id;});
}

/* -- Cloud Sync (JSONBin.io) -- */
async function cloudSync(silent) {
  var key=profile.cloudApiKey, bin=profile.cloudBinId;
  if(!key) { if(!silent) toast("KEIN API-KEY"); return; }
  if(!silent) toast("CLOUD SYNC...");
  try {
    var data = {version:2, synced:new Date().toISOString(), profile:profile, trips:trips, boats:boats};
    var url = bin ? "https://api.jsonbin.io/v3/b/"+bin : "https://api.jsonbin.io/v3/b";
    var hdrs = {"Content-Type":"application/json","X-Master-Key":key};
    if(!bin) { hdrs["X-Bin-Name"]="SCKR-Fahrtenbuch"; hdrs["X-Bin-Private"]="true"; }
    var r = await fetch(url,{method:bin?"PUT":"POST",headers:hdrs,body:JSON.stringify(data)});
    if(!r.ok) throw new Error("HTTP "+r.status);
    var json = await r.json();
    var newBin = (json.metadata&&json.metadata.id)||bin;
    if(newBin!==bin){profile.cloudBinId=newBin; await DB.set("profile",profile);}
    lastSyncTime=new Date();
    updateSyncBadge();
    if(!silent) toast("CLOUD GESPEICHERT");
  } catch(e) { if(!silent) toast("FEHLER: "+e.message); }
}

async function cloudLoad() {
  var key=profile.cloudApiKey, bin=profile.cloudBinId;
  if(!key||!bin){toast("API-KEY + BIN-ID NOETIG");return;}
  toast("CLOUD LADEN...");
  try {
    var r = await fetch("https://api.jsonbin.io/v3/b/"+bin+"/latest",{headers:{"X-Master-Key":key}});
    if(!r.ok) throw new Error("HTTP "+r.status);
    var json = await r.json();
    var data = json.record;
    if(!data.trips) throw new Error("Ungueltige Daten");
    if(!confirm(data.trips.length+" Fahrten aus Cloud laden?")) return;
    var added=0;
    for(var i=0;i<data.trips.length;i++){
      var found=false;
      for(var j=0;j<trips.length;j++){if(trips[j].id===data.trips[i].id){found=true;break;}}
      if(!found){await saveTrip(data.trips[i]);added++;}
    }
    if(data.boats){boats=data.boats;await DB.set("boats",boats);}
    toast(added+" NEUE FAHRTEN GELADEN");
    goto(currentTab);
  } catch(e) { toast("FEHLER: "+e.message); }
}

function startAutoSync() {
  if(syncTimer) clearInterval(syncTimer);
  if(!profile.autoSync||!profile.cloudApiKey) return;
  var ms = (profile.syncIntervalMin||30)*60000;
  syncTimer = setInterval(function(){cloudSync(true);}, ms);
}

function updateSyncBadge() {
  var el=document.getElementById("sync-badge");
  if(!el) return;
  if(lastSyncTime) {
    var min=Math.floor((Date.now()-lastSyncTime.getTime())/60000);
    el.textContent = min<1?"SYNC OK":"SYNC "+min+"MIN";
    el.style.color = "#1AABA0";
  } else {
    el.textContent="BSV"; el.style.color="";
  }
}

function importJSON(input) {

  file.text().then(function(text){
    var data=JSON.parse(text);
    if(!confirm((data.trips?data.trips.length:0)+" Fahrten importieren?")) return;
    var added=0;
    var promises=[];
    for(var i=0;i<(data.trips||[]).length;i++){

/* -- Tracking -- */
async function startTracking(prefill) {
  var trip = newTrip(prefill);
  trip.startTime = new Date().toISOString();
  trip.isTracked = true;
  activeTrip=trip; trackPts=[]; infraEvs=[]; liveKm=0; elapsed=0; tracking=true;
  startT=Date.now(); closeSheet();
  timerId=setInterval(function(){
    elapsed=Math.floor((Date.now()-startT)/1000);
    var km=0; for(var i=1;i<trackPts.length;i++) km+=haversine(trackPts[i-1],trackPts[i]);
    liveKm=km;
    if(currentTab==="live") renderLive();
  },1000);
  if(navigator.geolocation) {
    gpsGranted = true;
    watchId=navigator.geolocation.watchPosition(function(pos){
      if(pos.coords.accuracy>60) return;
      var pt={t:new Date(pos.timestamp).toISOString(),lat:pos.coords.latitude,lng:pos.coords.longitude};
      var last=trackPts.length>0?trackPts[trackPts.length-1]:null;
      if(last && haversine(last,pt)*1000<5) return;
      trackPts.push(pt);
    }, function(err){toast("GPS: "+err.message);}, {enableHighAccuracy:true,maximumAge:1000,timeout:30000});
  } else {
    toast("GPS NICHT VERFUEGBAR");
  }
  await saveTrip(trip);
  renderLive();
}

async function stopTracking() {
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  clearInterval(timerId);
  if(!activeTrip) return;
  activeTrip.endTime=new Date().toISOString();
  activeTrip.trackPoints=trackPts;
  activeTrip.infraEvents=infraEvs;
  var km=0; for(var i=1;i<trackPts.length;i++) km+=haversine(trackPts[i-1],trackPts[i]);
  km=Math.round(km*100)/100;
  if(activeTrip.category==="Binnen") activeTrip.sailKm=km;
  else activeTrip.sailSm=Math.round(km/1.852*100)/100;
  tracking=false;
  await saveTrip(activeTrip);
  var saved=activeTrip; activeTrip=null;
  toast("FAHRT GESPEICHERT - OSM & WETTER LADEN...");
  detectOSM(saved).then(function(){saveTrip(saved);}).catch(function(){});
  fetchTripWeather(saved,function(t){if(t) saveTrip(t);});
  if(profile.autoSync && profile.cloudApiKey) cloudSync(true);
  renderLive();
}

function tagInfra(type) {
  if(!activeTrip||trackPts.length===0){toast("KEINE GPS-POSITION");return;}
  var last=trackPts[trackPts.length-1];
  infraEvs.push({id:crypto.randomUUID(),type:type,t:new Date().toISOString(),lat:last.lat,lng:last.lng,name:"",auto:false});
  if(type==="Bruecke") activeTrip.bridges=(activeTrip.bridges||0)+1;
  else activeTrip.locks=(activeTrip.locks||0)+1;
  toast(type+" EINGETRAGEN");
}

/* -- Geofence -- */
function distHome(lat,lng){return haversine({lat:lat,lng:lng},{lat:profile.homePortLat,lng:profile.homePortLon})*1000;}
function startGeofence() {
  if(!navigator.geolocation||!profile.autoTrack){geoState="off";return;}
  if(geoWatchId!==null) return;
  geoState="watching";
  geoWatchId=navigator.geolocation.watchPosition(function(pos){
    if(pos.coords.accuracy>80) return;
    var d=distHome(pos.coords.latitude,pos.coords.longitude);
    geoLastDist=Math.round(d);
    if(!tracking && d>(profile.geoStartM||200)){
      geoState="away"; geoAutoStarted=true;
      var b=boats.length>0?boats[0]:{};
      startTracking({category:b.category||profile.defaultCategory,boatClass:b.boatClass||"",sailNumber:b.sailNumber||"",yachtName:b.name||"",description:"Auto-Start (Geofence)"});
      toast("AUTO-START "+Math.round(d)+"m VON SCKR");
    } else if(tracking && geoAutoStarted && d<(profile.geoStopM||100)){
      geoState="watching"; geoAutoStarted=false;
      stopTracking(); toast("AUTO-STOP - KRUEPELSEE ERREICHT");
    }
    if(currentTab==="live") renderLive();
  },function(){},{enableHighAccuracy:true,maximumAge:15000,timeout:60000});
}
function stopGeofence(){
  if(geoWatchId!==null){navigator.geolocation.clearWatch(geoWatchId);geoWatchId=null;}
  geoState="off";geoLastDist=null;
}

/* -- OSM detection -- */
async function detectOSM(trip) {
  var pts=trip.trackPoints; if(!pts||pts.length<2) return;
  var lats=[],lons=[];
  for(var i=0;i<pts.length;i++){lats.push(pts[i].lat);lons.push(pts[i].lng);}
  var buf=200/111000;
  var minLat=Math.min.apply(null,lats)-buf, maxLat=Math.max.apply(null,lats)+buf;
  var minLon=Math.min.apply(null,lons)-buf, maxLon=Math.max.apply(null,lons)+buf;
  var q='[out:json][timeout:45];(node["waterway"="lock_gate"]('+minLat+','+minLon+','+maxLat+','+maxLon+');way["lock"="yes"]('+minLat+','+minLon+','+maxLat+','+maxLon+');way["man_made"="bridge"]('+minLat+','+minLon+','+maxLat+','+maxLon+');way["bridge"]["highway"]('+minLat+','+minLon+','+maxLat+','+maxLon+'););out center tags;';
  try {
    var r=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:"data="+encodeURIComponent(q)});
    if(!r.ok) return;
    var data=await r.json();
    if(!trip.infraEvents) trip.infraEvents=[];
    var ex={};
    for(var j=0;j<trip.infraEvents.length;j++){
      var e=trip.infraEvents[j];
      ex[e.lat.toFixed(4)+";"+e.lng.toFixed(4)+";"+e.type]=true;
    }
    var elems=data.elements||[];
    for(var k=0;k<elems.length;k++){
      var el=elems[k];
      var lat=el.lat||(el.center&&el.center.lat);
      var lon=el.lon||(el.center&&el.center.lon);
      if(!lat||!lon) continue;
      var tags=el.tags||{};
      var type;
      if(tags.lock==="yes"||tags.waterway==="lock_gate") type="Schleuse";
      else if(tags.bridge||tags.man_made==="bridge") type="Bruecke";
      else continue;
      var minD=Infinity,nearT=new Date().toISOString();
      for(var p=0;p<pts.length;p++){
        var dd=haversine(pts[p],{lat:lat,lng:lon})*1000;
        if(dd<minD){minD=dd;nearT=pts[p].t;}
      }
      if(minD>40) continue;
      var key=lat.toFixed(4)+";"+lon.toFixed(4)+";"+type;
      if(ex[key]) continue;
      trip.infraEvents.push({id:crypto.randomUUID(),type:type,t:nearT,lat:lat,lng:lon,name:tags.name||"",auto:true});
      ex[key]=true;
    }
    trip.bridges=trip.infraEvents.filter(function(e){return e.type==="Bruecke";}).length;
    trip.locks=trip.infraEvents.filter(function(e){return e.type==="Schleuse";}).length;
  } catch(e) {}
}

  var pct=Math.min(100,(st.total/1000)*100);
  var df=function(d){return d.toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric"});};
  var yrs=[seasonYear-1,seasonYear,seasonYear+1];

  var html='<div class="shead"><div><div class="lxs">BSV Fahrtenwettbewerb</div><h2>Saisonpunkte</h2></div></div>'
    +'<div class="season-pick">';

    +'<div style="display:flex;gap:6px;flex-wrap:wrap">'

  var rows2=[["Fernfahrt",st.fe],["Trailer (1x)",st.tr],["Gemeinschaft",st.co],["Regatta-Funktion",st.rf]];
  for(var k=0;k<rows2.length;k++) html+='<div class="prow"><span class="lv">'+rows2[k][0]+'</span><span class="rv">'+Math.round(rows2[k][1])+'</span></div>';
  if(st.crOver) html+='<div class="warn">Gemeinschaft+Funktion auf 300 gedeckelt</div>';
  html+='</div>';

  // Bordtage
  html+='<div class="pnl"><div class="phd"><span class="phd-t">Bordtage</span></div>'
    +'<div class="prow"><span class="lv">Bordtage gesamt (max. 50)</span><span class="rv">'+st.bd+'</span></div>'
    +'<div class="prow"><span class="lv">davon Kueste (max. 20)</span><span class="rv">'+st.ku+'</span></div>'

  // Excel Export + Regelwerk

    +'</div></div>';

  document.getElementById("stats").innerHTML=html;

function setHomeToPos() {
  if(!navigator.geolocation){toast("GPS NICHT VERFUEGBAR");return;}
  navigator.geolocation.getCurrentPosition(function(pos){
    profile.homePortLat=+pos.coords.latitude.toFixed(5);
    profile.homePortLon=+pos.coords.longitude.toFixed(5);
    DB.set("profile",profile); renderSettings();
    toast("HEIMATHAFEN GESETZT");
  },function(){toast("STANDORT NICHT VERFUEGBAR");},{enableHighAccuracy:true,timeout:10000});

function selectBoatChip(el, id) {

  var b=null; for(var j=0;j<boats.length;j++){if(boats[j].id===id){b=boats[j];break;}}

  var cls=document.getElementById("nt-cls-display"); if(cls) cls.textContent=b.boatClass||"-";

    +'<button type="button" onclick="confirmDelTrip(\''+t.id+'\')" style="padding:14px 16px;border-radius:var(--r);border:none;background:rgba(192,57,43,.2);color:#e74c3c;font-weight:700;cursor:pointer;font-family:var(--fd);font-size:14px">LOESCHEN</button></div>';

  if(t.lastEdited) html+='<div style="text-align:center;margin-top:10px;font-size:11px;color:var(--mut)">ZULETZT: '+new Date(t.lastEdited).toLocaleString("de-DE")+'</div>';

  openSheet(html);

  if(t.trackPoints && t.trackPoints.length > 1) {
    setTimeout(function(){ showMap("detail-map",t.trackPoints,t.infraEvents||[]); },100);
  }
}

async function saveDetail() {
  var t=null; for(var i=0;i<trips.length;i++){if(trips[i].id===_detId){t=trips[i];break;}} if(!t) return;
  var w=readW();
  t.date=(document.getElementById("dt-date")||{}).value||t.date;
  t.description=(document.getElementById("dt-desc")||{}).value||"";
  t.category=(document.getElementById("dt-cat")||{}).value||t.category;
  t.boatClass=(document.getElementById("dt-cls")||{}).value||"";
  t.sailNumber=(document.getElementById("dt-sn")||{}).value||"";
  t.yachtName=(document.getElementById("dt-yn")||{}).value||"";
  t.sailKm=+(document.getElementById("dt-sk")||{}).value||0;
  t.sailSm=+(document.getElementById("dt-ss")||{}).value||0;
  t.motorKm=+(document.getElementById("dt-mk")||{}).value||0;
  t.motorSm=+(document.getElementById("dt-ms")||{}).value||0;
  t.fernKm=+(document.getElementById("dt-fk")||{}).value||0;
  t.bridges=stpVal("dt-br"); t.locks=stpVal("dt-lk");
  t.isTrailered=swVal("dt-tr"); t.isCommunity=swVal("dt-cm"); t.hasRegattaFn=swVal("dt-rf");
  t.windDir=w.windDir; t.windForce=w.windForce; t.cloudiness=w.cloudiness;
  t.notes=(document.getElementById("dt-notes")||{}).value||"";
  var st=(document.getElementById("dt-st")||{}).value;
  var et=(document.getElementById("dt-et")||{}).value;
  if(st) t.startTime=new Date(t.date+"T"+st+":00").toISOString();
  if(et) t.endTime=new Date(t.date+"T"+et+":00").toISOString();
  t.lastEdited=new Date().toISOString();
  await saveTrip(t); closeSheet(); toast("GESPEICHERT - "+Math.round(tripPts(t))+" PKT"); renderTrips();
}

function removeInfra(tripId,infraId) {
  var t=null; for(var i=0;i<trips.length;i++){if(trips[i].id===tripId){t=trips[i];break;}} if(!t) return;
  t.infraEvents=t.infraEvents.filter(function(e){return e.id!==infraId;});
  t.bridges=t.infraEvents.filter(function(e){return e.type==="Bruecke";}).length;
  t.locks=t.infraEvents.filter(function(e){return e.type==="Schleuse";}).length;
  saveTrip(t).then(function(){openDetail(tripId);});
}

function confirmDelTrip(id) {
  if(!confirm("Diese Fahrt wirklich loeschen?")) return;
  deleteTrip(id).then(function(){closeSheet();toast("GELOESCHT");renderTrips();});
}

function rerunOSM(id) {
  var t=null; for(var i=0;i<trips.length;i++){if(trips[i].id===id){t=trips[i];break;}} if(!t) return;
  toast("OSM WIRD ABGEFRAGT...");
  detectOSM(t).then(function(){saveTrip(t).then(function(){openDetail(id);});});
}

/* -- Excel Export using embedded BSV template -- */
async function exportExcel() {
  toast("EXCEL WIRD ERZEUGT...");
  try {
    // Dynamically load JSZip
    if(typeof JSZip === "undefined") {
      await new Promise(function(resolve,reject){
        var s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
        s.onload=resolve; s.onerror=reject;
        document.head.appendChild(s);
      });
    }
    var bin=atob(XLSX_B64);
    var bytes=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    var zip=await JSZip.loadAsync(bytes);
    var sheet=await zip.file("xl/worksheets/sheet1.xml").async("string");

    // Simple inline string insertion
    function inlCell(ref,s) {
      return '<c r="'+ref+'" t="inlineStr"><is><t>'+(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</t></is></c>';
    }
    function numCell(ref,v) { return '<c r="'+ref+'"><v>'+v+'</v></c>'; }
    function serial(d) { return Math.floor((new Date(d)-new Date(Date.UTC(1899,11,30)))/86400000); }
    function timeFrac(d) { var t=new Date(d); return(t.getUTCHours()*3600+t.getUTCMinutes()*60+t.getUTCSeconds())/86400; }
    function inject(xml,ref,cell) {
      var re=new RegExp('<c r="'+ref+'"[^/]*?(?:/>|>[\\s\\S]*?</c>)');
      if(re.test(xml)) return xml.replace(re,cell);
      var row=ref.replace(/[A-Z]/g,"");
      var rr=new RegExp('(<row r="'+row+'"[^>]*>[\\s\\S]*?)</row>');
      if(rr.test(xml)) return xml.replace(rr,"$1"+cell+"</row>");
      return xml;
    }

    if(profile.name) sheet=inject(sheet,"C1",inlCell("C1",profile.name));
    if(profile.age)  sheet=inject(sheet,"C2",numCell("C2",profile.age));

    var sorted=trips.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);}).slice(0,50);
    for(var j=0;j<sorted.length;j++){
      var t=sorted[j], r=6+j;
      sheet=inject(sheet,"B"+r,numCell("B"+r,serial(t.date)));
      var cls=[t.boatClass,t.sailNumber].filter(Boolean).join(" ");
      if(cls) sheet=inject(sheet,"C"+r,inlCell("C"+r,cls));
      if(t.yachtName) sheet=inject(sheet,"D"+r,inlCell("D"+r,t.yachtName));
      if(t.sailKm) sheet=inject(sheet,"E"+r,numCell("E"+r,t.sailKm));
      if(t.sailSm) sheet=inject(sheet,"F"+r,numCell("F"+r,t.sailSm));
      if(t.motorKm) sheet=inject(sheet,"G"+r,numCell("G"+r,t.motorKm));
      if(t.motorSm) sheet=inject(sheet,"H"+r,numCell("H"+r,t.motorSm));
      if(t.fernKm) sheet=inject(sheet,"I"+r,numCell("I"+r,t.fernKm));
      if(t.bridges) sheet=inject(sheet,"J"+r,numCell("J"+r,t.bridges));
      if(t.locks) sheet=inject(sheet,"L"+r,numCell("L"+r,t.locks));
      if(t.isTrailered) sheet=inject(sheet,"O"+r,numCell("O"+r,1));
      if(t.isCommunity) sheet=inject(sheet,"P"+r,numCell("P"+r,1));
      if(t.hasRegattaFn) sheet=inject(sheet,"Q"+r,numCell("Q"+r,1));
      if(t.description) sheet=inject(sheet,"S"+r,inlCell("S"+r,t.description));
      if(t.startTime) sheet=inject(sheet,"T"+r,numCell("T"+r,timeFrac(t.startTime)));
      if(t.endTime) sheet=inject(sheet,"U"+r,numCell("U"+r,timeFrac(t.endTime)));
      if(t.cloudiness) sheet=inject(sheet,"V"+r,inlCell("V"+r,t.cloudiness));
      var wind=[t.windDir,t.windForce].filter(Boolean).join(" ");
      if(wind) sheet=inject(sheet,"W"+r,inlCell("W"+r,wind));
    }
    zip.file("xl/worksheets/sheet1.xml",sheet);
    var blob=await zip.generateAsync({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url; a.download="Fahrtenbuch_SCKR_"+new Date().toISOString().slice(0,10)+".xlsx";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast("EXCEL HERUNTERGELADEN");
  } catch(e) { toast("EXCEL-FEHLER: "+e.message); }
}

/* -- GPS Permission -- */
var gpsGranted = false;

function requestGPS() {
  if (!navigator.geolocation) { toast("GPS NICHT VERFUEGBAR AUF DIESEM GERAET"); return; }
  toast("GPS WIRD ANGEFRAGT...");
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      gpsGranted = true;
      toast("GPS AKTIV - " + pos.coords.latitude.toFixed(4) + ", " + pos.coords.longitude.toFixed(4));
      // Now start geofence if enabled
      if(profile.autoTrack) startGeofence();
      // Load weather now that we have permission
      fetchCurrentWeather(function(wx){
        if(wx && currentTab==="live") renderLive();
      });
      renderLive();
    },
    function(err) {
      var msg = "GPS FEHLER";
      if(err.code === 1) msg = "GPS VERWEIGERT - Bitte in iPhone Einstellungen > Safari > Standort erlauben";
      if(err.code === 2) msg = "GPS NICHT VERFUEGBAR";
      if(err.code === 3) msg = "GPS TIMEOUT - Nochmal versuchen";
      toast(msg, 5000);
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

/* -- INIT -- */
(async function() {
  var p = await DB.get("profile");
  if(p) { for(var k in p) profile[k]=p[k]; }

  var b = await DB.get("boats");
  if(b) boats=b;

  var keys = await DB.list("trip:");
  for(var i=0;i<keys.length;i++) {
    var t = await DB.get(keys[i]);
    if(t) trips.push(t);
  }
  trips.sort(function(a,b){return new Date(b.date)-new Date(a.date);});

  if(profile.logoB64) applyLogo(profile.logoB64);
  if(profile.autoTrack) startGeofence();
  if(profile.autoSync && profile.cloudApiKey) startAutoSync();

  // Weather loaded only after user interaction (iOS Safari requirement)
  // fetchCurrentWeather is called when user taps "Fahrt starten" or weather button

  // Auto-fix: load weather for trips that are missing it
  for(var j=0;j<Math.min(trips.length,10);j++){
    if(!trips[j].windDir && trips[j].date){
      (function(idx){
        fetchTripWeather(trips[idx],function(updated){
          if(updated) saveTrip(updated);
        });
      })(j);
    }
  }

  renderLive();
})();

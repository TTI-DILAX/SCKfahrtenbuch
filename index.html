<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#061828">
<title>SCKR Fahrtenbuch 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Libre+Baskerville:wght@400;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ═══════════════════════════════════════════════════
   SCKR SUITE - Design Tokens (Admin-aendernbar)
   ═══════════════════════════════════════════════════ */
/* ═══ DESIGN-TOKENS (Admin-aenderbar) ═══ */
:root {
  /* ═══ 3 VEREINSFARBEN (Admin-konfigurierbar) ═══
     --club-accent:  Hauptakzent (SCKR: Rot)
     --club-header:  Header-Hintergrund (SCKR: fast Schwarz)
     --club-second:  Sekundaerfarbe, Unterstrich, Icons (SCKR: etwas helleres Rot)
     Alle anderen Farben leiten sich automatisch ab. */
  --club-accent:  #C8102E;
  --club-header:  #1a1a1a;
  --club-second:  #8B0B1F;

  /* Typografie */
  --fd: 'Barlow Condensed', sans-serif;
  --fs: 'Libre Baskerville', serif;
  --fb: 'Barlow', sans-serif;
  --r:  6px;
  --r2: 12px;
}

/* ══ HELL-MODUS ══
   Seite: Weiß/Hellgrau - viel Luft
   Header: Vereinsfarbe (--club-header)
   Akzent: --club-accent ueberall */
[data-theme="light"] {
  --bg:       #F6F6F6;
  --bg2:      #FFFFFF;
  --bg3:      #EFEFEF;
  --surface:  #FFFFFF;
  --acc:      var(--club-accent);
  --acc2:     var(--club-second);
  --nav:      var(--club-header);
  --text:     #1a1a1a;
  --text2:    #555555;
  --mut:      #999999;
  --bdr:      #E5E5E5;
  --shadow:   0 1px 8px rgba(0,0,0,.07);
  --shadow2:  0 4px 20px rgba(0,0,0,.12);
}

/* ══ DUNKEL-MODUS ══
   Seite: Anthrazit - kein Navy-Blau
   Header: Vereinsfarbe (--club-header), etwas dunkler
   Akzent: --club-accent, leicht aufgehellt */
[data-theme="dark"] {
  --bg:       #141414;
  --bg2:      #1e1e1e;
  --bg3:      #272727;
  --surface:  #1e1e1e;
  --acc:      var(--club-accent);
  --acc2:     var(--club-second);
  --nav:      var(--club-header);
  --text:     #F0F0F0;
  --text2:    #AAAAAA;
  --mut:      #666666;
  --bdr:      rgba(255,255,255,.09);
  --shadow:   0 2px 12px rgba(0,0,0,.5);
  --shadow2:  0 8px 32px rgba(0,0,0,.65);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{
  font-family:var(--fb);background:var(--bg);color:var(--wh);
  max-width:520px;margin:0 auto;min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  background-image: none; /* Grid removed for cleaner look */
}
button,input,select,textarea{font-family:var(--fb);color:inherit;-webkit-appearance:none}
a{color:var(--acc2)}

/* LEAFLET FIX */
.leaflet-container{background:var(--bg2)!important;height:100%!important;width:100%!important}
.leaflet-tile-pane{opacity:.88}
.leaflet-control-attribution{background:rgba(6,24,40,.8)!important;color:var(--mut)!important;font-size:9px!important}
.leaflet-control-zoom a{background:rgba(6,24,40,.9)!important;color:var(--text2)!important;border-color:var(--bdr)!important}

/* THEME TOGGLE */
.theme-toggle{background:var(--bg3);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:20px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:var(--fd);font-weight:700;letter-spacing:.06em}
.theme-toggle:hover{background:rgba(255,255,255,.1)}

/* LIGHT MODE OVERRIDES */
[data-theme="light"] body{background:#F4F6F9}
[data-theme="light"] .tab{color:#5a6a8a}
[data-theme="light"] .tab.active{color:var(--text2)}
[data-theme="light"] .prow .lv{color:#3a4a6a}
[data-theme="light"] .trip-card:active{background:#f0f4ff}
[data-theme="light"] .gauge-val,[data-theme="light"] .hero-num{color:var(--club-blue)}
[data-theme="light"] .gauge-lbl,[data-theme="light"] .lxs{color:#7a8aaa}
[data-theme="light"] .ship-title,[data-theme="light"] .hdr-text .title{color:#ffffff}
[data-theme="light"] .hdr-text .club{color:rgba(255,255,255,.75)}
[data-theme="light"] .sheet{box-shadow:0 -8px 40px rgba(0,0,0,.15)}
[data-theme="light"] .btn-ghost{color:var(--club-blue);border-color:var(--club-blue)}
[data-theme="light"] .phd-t{color:var(--text2)}
[data-theme="light"] select.inp option{background:#fff;color:#1a1a2e}
[data-theme="light"] .empty{color:#9aaccc}
[data-theme="light"] .warn{background:var(--bg3);border-left-color:var(--text2)}
[data-theme="light"] .geo.watch{background:rgba(26,58,107,.08);color:var(--club-blue);border-color:rgba(26,58,107,.3)}
[data-theme="light"] .map-wrap{border-color:rgba(26,58,107,.2)}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;background:var(--nav);border-bottom:3px solid var(--acc);padding-top:env(safe-area-inset-top)}
.hdr-top{display:flex;align-items:center;gap:12px;padding:11px 16px 10px;border-bottom:1px solid rgba(255,255,255,.1)}
#hdr-logo{width:44px;height:44px;flex-shrink:0;border-radius:50%;cursor:pointer;border:1.5px solid var(--acc3);filter:drop-shadow(0 0 8px rgba(200,168,75,.35));display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg2)}
#hdr-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hdr-text{flex:1;min-width:0}
.hdr-text .club{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.7);line-height:1}
.hdr-text .title{font-family:var(--fs);font-size:15px;font-weight:700;color:#ffffff;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-badge{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--text2);background:rgba(200,168,75,.12);border:1px solid var(--bdr);border-radius:4px;padding:3px 9px;cursor:pointer}

/* SPONSOR BANNER */
.sponsor-banner{padding:8px 12px;background:linear-gradient(90deg,rgba(200,168,75,.08),rgba(26,171,160,.08));border-bottom:1px solid var(--bdr2);font-size:11px;color:var(--mut);display:flex;align-items:center;gap:8px;overflow:hidden;white-space:nowrap}
.sponsor-banner .spon-label{font-family:var(--fd);font-weight:700;letter-spacing:.08em;color:var(--acc3);flex-shrink:0}
.sponsor-banner .spon-content{flex:1;overflow:hidden;text-overflow:ellipsis;font-family:var(--fb);color:var(--off);font-weight:500}

/* TABS */
.tabs{display:grid;grid-template-columns:repeat(4,1fr)}
.tab{background:var(--bg3);border:none;border-top:2px solid transparent;color:var(--mut);font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:10px 4px 11px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:color .15s}
.tab svg{width:18px;height:18px;fill:currentColor}
.tab.active{color:var(--text2);border-top-color:var(--text2)}

/* SCREENS */
.screen{padding:16px 14px calc(100px + env(safe-area-inset-bottom));display:none}
.screen.active{display:block}
.shead{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--bdr2)}
.shead h2{font-family:var(--fd);font-weight:800;font-size:26px}
.lxs{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--acc3)}

/* PANEL */
.pnl{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
.phd{padding:9px 16px;background:var(--bg3);border-bottom:2px solid var(--acc);display:flex;align-items:center;gap:8px}
.phd::before{content:'';width:2px;height:12px;background:var(--acc);border-radius:2px}
.phd-t{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.prow{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--bdr2)}
.prow:last-child{border-bottom:none}
.prow .lv{font-size:14px;color:var(--off)}
.prow .rv{font-family:var(--fd);font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}

/* FIELDS */
.fld{padding:10px 16px;border-bottom:1px solid var(--bdr2)}
.fld:last-child{border-bottom:none}
.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc3);margin-bottom:4px}
.inp{width:100%;border:none;background:var(--bg3);padding:6px 8px;border-radius:5px;font-size:15px;outline:none;color:var(--wh);border:1px solid var(--bdr2)}
.inp::placeholder{color:var(--mut)}
.inp:focus{border-color:var(--text2);outline:none}
textarea.inp{resize:vertical;min-height:50px}
select.inp option{background:#0d2540;color:#F5F0E8}
.g2{display:grid;grid-template-columns:1fr 1fr}
.g2 .fld:nth-child(odd){border-right:1px solid var(--bdr2)}
.ro{padding:10px 16px;border-bottom:1px solid var(--bdr2);display:flex;justify-content:space-between;align-items:center}
.ro .ro-val{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--off)}

/* TOGGLE */
.trow{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--bdr2)}
.trow:last-child{border-bottom:none}
.sw{width:46px;height:28px;background:rgba(255,255,255,.1);border-radius:100px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;display:inline-block;border:1px solid rgba(255,255,255,.12)}
.sw::after{content:'';position:absolute;top:2px;left:2px;width:22px;height:22px;background:var(--off);border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.4);transition:left .2s}
.sw.on{background:var(--green)}
.sw.on::after{left:20px}

/* STEPPER */
.stp{display:inline-flex;align-items:center;gap:8px;background:rgba(200,168,75,.1);border-radius:100px;border:1px solid var(--bdr);padding:3px}
.stp button{width:28px;height:28px;border-radius:50%;border:none;background:rgba(200,168,75,.2);color:var(--acc2);font-size:18px;font-weight:700;cursor:pointer;line-height:1;font-family:inherit}
.stp span{min-width:28px;text-align:center;font-weight:700;font-family:var(--fd);font-size:16px}

/* BUTTONS */
.btn{width:100%;padding:14px;border-radius:var(--r);border:none;font-family:var(--fd);font-size:17px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .15s}
.btn:active{opacity:.82}
.btn-gold{background:var(--acc);color:#fff;box-shadow:0 4px 20px rgba(200,168,75,.3)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 4px 16px rgba(26,138,80,.35)}
.btn-red{background:var(--red);color:#fff}
.btn-teal{background:var(--teal);color:#fff;box-shadow:0 4px 16px rgba(26,171,160,.35)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--bdr);font-size:14px}
.btn-sm{padding:7px 14px;border-radius:6px;border:1px solid var(--bdr);background:rgba(200,168,75,.12);color:var(--acc2);font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}

/* BOAT CHIPS */
.boat-chips{display:flex;gap:8px;flex-wrap:wrap;padding:12px 14px;border-bottom:1px solid var(--bdr2)}
.boat-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:100px;cursor:pointer;background:var(--surface);border:1px solid var(--bdr);font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:.04em;color:var(--off);transition:all .15s}
.boat-chip.sel{background:rgba(200,168,75,.25);border-color:var(--text2);color:var(--acc2)}
.boat-chip-add{background:var(--bg3);border-style:dashed;color:var(--mut)}

/* INSTRUMENT DASHBOARD */
.inst{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:14px;box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(200,168,75,.12)}
.inst-hd{padding:12px 16px 8px;background:linear-gradient(90deg,rgba(200,168,75,.1),transparent);border-bottom:1px solid var(--bdr2);display:flex;align-items:center;justify-content:space-between}
.inst-hd-t{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text2)}
.live-dot{width:8px;height:8px;background:var(--teal);border-radius:50%;box-shadow:0 0 8px var(--teal)}

/* Primary gauges */
.inst-primary{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--bdr2)}
.gauge{padding:16px 14px;text-align:center;border-right:1px solid var(--bdr2)}
.gauge:last-child{border-right:none}
.gauge-val{font-family:var(--fd);font-size:40px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums;line-height:1}
.gauge-unit{font-size:14px;font-weight:600;color:var(--acc3);margin-left:3px}
.gauge-lbl{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);margin-top:5px}

/* Compass */
.compass-wrap{padding:10px;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--bdr2)}
.compass{width:90px;height:90px;position:relative}

/* Secondary stats */
.inst-grid{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--bdr2)}
.inst-cell{padding:10px 6px;text-align:center;border-right:1px solid var(--bdr2)}
.inst-cell:last-child{border-right:none}
.inst-val{font-family:var(--fd);font-size:20px;font-weight:800;color:var(--acc2);font-variant-numeric:tabular-nums;line-height:1}
.inst-unit{font-size:11px;font-weight:600;color:var(--acc3);margin-left:2px}
.inst-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-top:4px}

/* Propulsion switch */
.prop-switch{display:grid;grid-template-columns:1fr 1fr;padding:10px 12px;gap:8px;border-bottom:1px solid var(--bdr2)}
.prop-btn{padding:12px;border-radius:var(--r);cursor:pointer;font-family:var(--fd);font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.04);color:var(--mut);border:2px solid rgba(255,255,255,.08);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.prop-btn.active{background:rgba(30,111,191,.25);color:#5BAAEE;border-color:#1E6FBF;box-shadow:0 0 14px rgba(30,111,191,.35)}
.prop-btn.active.motor{background:rgba(200,16,46,.2);color:#ff6b6b;border-color:var(--text2);box-shadow:0 0 14px rgba(200,16,46,.3)}

.infra-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px}
.infra-btn{padding:10px;border-radius:var(--r);cursor:pointer;font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:.05em;background:rgba(200,168,75,.1);color:var(--acc2);border:1px solid var(--bdr)}
.idle-msg{padding:24px 16px;text-align:center;color:var(--mut);font-size:13px;line-height:1.7}

/* Weather strip */
.wx-strip{display:flex;border-bottom:1px solid var(--bdr2)}
.wx-item{flex:1;padding:10px 12px;text-align:center;border-right:1px solid var(--bdr2)}
.wx-item:last-child{border-right:none}
.wx-val{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--acc2)}
.wx-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-top:3px}

/* GEO BANNER */
.geo{padding:10px 14px;border-radius:var(--r);margin-bottom:12px;display:flex;align-items:center;gap:10px;font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:.04em}
.geo.on{background:rgba(34,197,94,.1);color:#16a34a;border:1px solid rgba(34,197,94,.25)}
.geo.watch{background:rgba(200,16,46,.06);color:var(--acc);border:1px solid rgba(200,16,46,.2)}
.geo.warn{background:rgba(192,57,43,.15);color:#e67e22;border:1px solid #e67e22}
.geo-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}
.pulse{animation:pulse 1.4s infinite}

/* MAP */
.map-wrap{margin:8px 12px;border-radius:var(--r);overflow:hidden;border:1px solid var(--bdr2);height:220px;min-height:220px;position:relative;background:var(--bg2)}

/* TRACK SVG */
.track-wrap{margin:8px 12px;border-radius:var(--r);overflow:hidden;background:var(--bg2);border:1px solid var(--bdr2)}
svg.track{width:100%;height:180px;display:block}

/* TRIP CARDS */
.trip-card{display:block;width:100%;text-align:left;cursor:pointer;background:var(--surface);border:1px solid var(--bdr2);border-left:4px solid var(--acc);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px;backdrop-filter:blur(4px)}
.trip-card:active{border-left-color:var(--text2);background:rgba(13,37,64,.9)}
.tr-date{font-family:var(--fd);font-size:18px;font-weight:800}
.tr-pts{font-family:var(--fd);font-size:15px;font-weight:800;color:var(--text2);background:var(--surface);border:1px solid var(--bdr);padding:2px 10px;border-radius:4px}
.tr-desc{font-size:13px;color:var(--mut);margin:5px 0 8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.chip{display:inline-flex;padding:2px 8px;background:rgba(200,168,75,.1);border:1px solid var(--bdr2);border-radius:4px;font-family:var(--fd);font-size:11px;font-weight:600;color:var(--acc3);letter-spacing:.04em}
.chip.see{background:rgba(26,171,160,.1);color:var(--teal);border-color:rgba(26,171,160,.3)}
.chip.gps{background:rgba(26,138,80,.1);color:#4ecf88;border-color:rgba(26,138,80,.3)}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-bar select{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--r);color:var(--acc2);font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:.04em;padding:8px 12px;cursor:pointer}
.filter-bar select option{background:#0d2540;color:#F5F0E8}

/* STATS HERO */
.hero{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);padding:22px 20px 18px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.hero::before{content:'SCK';position:absolute;right:-12px;top:-20px;font-family:var(--fd);font-size:110px;font-weight:900;color:rgba(200,168,75,.04);pointer-events:none}
.hero-num{font-family:var(--fd);font-size:68px;font-weight:900;line-height:1;color:var(--acc2);font-variant-numeric:tabular-nums;letter-spacing:-.02em;text-shadow:0 0 40px rgba(200,168,75,.4)}
.hero-unit{font-size:22px;font-weight:600;color:var(--acc3);margin-left:6px}
.prog{height:4px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden;margin:16px 0 7px}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--club-second),var(--acc));transition:width .6s;box-shadow:0 0 8px rgba(200,168,75,.5)}
.badge{display:inline-flex;padding:5px 12px;border-radius:4px;font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:.06em;background:rgba(200,16,46,.08);color:var(--acc);border:1px solid var(--bdr)}
.season-pick{display:flex;gap:4px;margin-bottom:14px;background:rgba(6,24,40,.8);border:1px solid var(--bdr2);border-radius:var(--r);padding:3px}
.season-pick button{flex:1;padding:7px;border:none;background:var(--bg3);border-radius:6px;cursor:pointer;font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--mut)}
.season-pick button.active{background:rgba(200,16,46,.08);color:var(--acc);border:1px solid var(--bdr)}

/* SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:900;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.sheet-bg.open{display:flex}
.sheet{background:var(--bg2);border:1px solid var(--bdr);border-bottom:none;width:100%;max-width:520px;max-height:92dvh;border-radius:20px 20px 0 0;padding:20px 14px calc(28px + env(safe-area-inset-bottom));overflow-y:auto;animation:su .28s cubic-bezier(.2,.8,.3,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bdr2)}
.sheet-close{border:1px solid var(--bdr2);background:rgba(255,255,255,.05);color:var(--mut);font-size:12px;cursor:pointer;padding:5px 12px;border-radius:6px;font-weight:600;font-family:var(--fd);letter-spacing:.05em}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--nav);border:1px solid var(--bdr);color:var(--wh);padding:10px 20px;border-radius:8px;font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:.04em;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.5);white-space:nowrap;max-width:90vw;text-align:center;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* FOOTER WITH SPONSOR */
.footer-spon{position:fixed;bottom:60px;left:0;right:0;max-width:520px;margin:0 auto;padding:6px 14px;background:rgba(6,24,40,.85);;border-top:1px solid var(--bdr2);z-index:49;display:flex;align-items:center;gap:10px;font-size:10px;color:var(--mut)}
.footer-spon .spon-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.footer-spon .spon-text{font-family:var(--fd);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc3)}

/* MISC */
.warn{margin-bottom:10px;padding:9px 14px;border-radius:var(--r);background:rgba(200,168,75,.1);border-left:3px solid var(--acc);font-size:13px;color:var(--acc2)}
.empty{text-align:center;padding:52px 20px;color:var(--mut)}
.pts-box{background:linear-gradient(135deg,#03101e,#0d2340);border:1px solid var(--bdr);border-radius:var(--r2);padding:18px;text-align:center;margin-top:12px}

/* TAB BAR FIXED BOTTOM ALWAYS VISIBLE */
.tabbar-fixed{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:var(--hdr-bg);border-top:2px solid var(--acc);z-index:50;padding-bottom:env(safe-area-inset-bottom)}

/* LANDSCAPE */
@media(orientation:landscape) and (max-height:500px){
  body{max-width:100%}
  .hdr{position:fixed;top:0;left:0;bottom:0;width:64px;border-right:1px solid var(--acc3);border-bottom:none;padding-top:env(safe-area-inset-top)}
  .hdr-top{flex-direction:column;padding:12px 8px;border-bottom:none;gap:8px}
  .hdr-text{display:none}
  .hdr-badge{font-size:9px;padding:2px 4px}
  .tabs{grid-template-columns:1fr;grid-template-rows:repeat(4,1fr)}
  .tab{border-top:none;border-left:2px solid transparent;padding:10px 6px}
  .tab.active{border-left-color:var(--text2);border-top-color:transparent}
  .sponsor-banner{display:none}
  .screen{margin-left:64px;padding:14px 12px 80px}
  .tabbar-fixed{display:none}
  .footer-spon{left:64px;bottom:0}
  .inst-primary{grid-template-columns:1fr 1fr 1fr 1fr}
  .inst-grid{grid-template-columns:repeat(6,1fr)}
  .sheet{max-width:100%}
}

SCKR.core.storage = {
  async get(k) {
    try {
      if (window.storage) { var r = await window.storage.get(k, false); return r ? JSON.parse(r.value) : null; }
      var v = localStorage.getItem("sckr_" + k); return v ? JSON.parse(v) : null;
    } catch(e) { return null; }
  },
  async set(k, v) {
    try {
      if (window.storage) return await window.storage.set(k, JSON.stringify(v), false);
      localStorage.setItem("sckr_" + k, JSON.stringify(v));
    } catch(e) {}
  },
  async del(k) {
    try {
      if (window.storage) return await window.storage.delete(k, false);
      localStorage.removeItem("sckr_" + k);
    } catch(e) {}
  },
  async list(prefix) {
    try {
      if (window.storage) { var r = await window.storage.list(prefix, false); return (r && r.keys) || []; }
      return Object.keys(localStorage).filter(function(k){ return k.indexOf("sckr_" + prefix) === 0; }).map(function(k){ return k.slice(5); });
    } catch(e) { return []; }
  }
};

// Event Bus - Module kommunizieren hierueber
SCKR.core.events = {
  listeners: {},
  on: function(event, cb) {
    if(!this.listeners[event]) this.listeners[event] = [];
    this.listeners[event].push(cb);
  },
  emit: function(event, data) {
    if(this.listeners[event]) {
      for(var i=0;i<this.listeners[event].length;i++) {
        try { this.listeners[event][i](data); } catch(e) { console.error(e); }
      }
    }
  }
};

// Navigation
SCKR.core.currentTab = "live";
SCKR.core.goto = function(tab) {
  var screens = document.querySelectorAll(".screen");
  for(var i=0;i<screens.length;i++) screens[i].classList.remove("active");
  document.getElementById(tab).classList.add("active");
  var tabs = document.querySelectorAll(".tab");
  for(var j=0;j<tabs.length;j++) tabs[j].classList.remove("active");
  document.getElementById("tab-"+tab).classList.add("active");
  SCKR.core.currentTab = tab;
  if(tab==="live")          SCKR.fahrtenbuch.render.live();
  else if(tab==="trips")    SCKR.fahrtenbuch.render.trips();
  else if(tab==="stats")    SCKR.fahrtenbuch.render.stats();
  else if(tab==="settings") SCKR.fahrtenbuch.render.settings();
};

// UI Helpers
SCKR.core.ui = {
  _tt: null,
  toast: function(msg, ms) {
    var el=document.getElementById("toast");
    el.textContent=msg; el.classList.add("show");
    clearTimeout(SCKR.core.ui._tt);
    SCKR.core.ui._tt=setTimeout(function(){el.classList.remove("show");}, ms||2600);
  },
  openSheet: function(html) {
    document.getElementById("sheet-body").innerHTML=html;
    document.getElementById("sheet-bg").classList.add("open");
  },
  closeSheet: function() {
    document.getElementById("sheet-bg").classList.remove("open");
  },
  promptLogoUpload: function() {
    if(!SCKR.admin.isUnlocked()) { SCKR.core.ui.toast("NUR ADMIN KANN LOGO AENDERN"); return; }
    document.getElementById("logo-input").click();
  },
  onLogoFile: function(input) {
    var file=input.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(e){
      SCKR.admin.state.branding.logoB64=e.target.result;
      SCKR.core.storage.set("admin_branding", SCKR.admin.state.branding);
      SCKR.core.ui.applyLogo(SCKR.admin.state.branding.logoB64);
      SCKR.core.ui.toast("LOGO AKTUALISIERT");
    };
    reader.readAsDataURL(file);
    input.value="";
  },
  applyLogo: function(b64) {
    var img=document.getElementById("logo-img"), svg=document.getElementById("logo-svg");
    if(!img||!svg) return;
    if(b64) { img.src=b64; img.style.display="block"; svg.style.display="none"; }
    else { img.style.display="none"; svg.style.display="block"; }
  },
  mkSw: function(id,on) { return '<button class="sw'+(on?' on':'')+'" id="'+id+'" onclick="this.classList.toggle(\'on\')" type="button"></button>'; },
  swVal: function(id) { var el=document.getElementById(id); return el ? el.classList.contains("on") : false; },
  mkStp: function(id,val) { return '<div class="stp"><button type="button" onclick="SCKR.core.ui.stpChg(\''+id+'\',-1)">-</button><span id="'+id+'">'+val+'</span><button type="button" onclick="SCKR.core.ui.stpChg(\''+id+'\',1)">+</button></div>'; },
  stpChg: function(id,d) { var el=document.getElementById(id); el.textContent=Math.max(0,(+el.textContent||0)+d); },
  stpVal: function(id) { return +(document.getElementById(id)||{}).textContent||0; }
};

// Formatters
SCKR.core.fmt = {
  esc: function(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); },
  date: function(d) { return new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric"}); },
  time: function(s) { if(s<3600) return Math.floor(s/60)+"m "+s%60+"s"; return Math.floor(s/3600)+"h "+Math.floor((s%3600)/60)+"m"; },
  dist: function(km,cat) { if(cat==="Binnen") return km.toFixed(2)+" km"; return (km/1.852).toFixed(2)+" sm"; },
  speed: function(ms) { return (ms*1.94384).toFixed(1); },  // m/s to knots
  compass: function(deg) {
    var dirs=["N","NNO","NO","ONO","O","OSO","SO","SSO","S","SSW","SW","WSW","W","WNW","NW","NNW"];
    return dirs[Math.floor(((deg+11.25)%360)/22.5)];
  }
};

// Utils
SCKR.core.util = {
  haversine: function(a,b) {
    var R=6371, r=function(x){return x*Math.PI/180;};
    return 2*R*Math.asin(Math.sqrt(Math.sin(r(b.lat-a.lat)/2)*Math.sin(r(b.lat-a.lat)/2)+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(r(b.lng-a.lng)/2)*Math.sin(r(b.lng-a.lng)/2)));
  },
  bearing: function(a,b) {
    var r=function(x){return x*Math.PI/180;};
    var y = Math.sin(r(b.lng-a.lng)) * Math.cos(r(b.lat));
    var x = Math.cos(r(a.lat))*Math.sin(r(b.lat)) - Math.sin(r(a.lat))*Math.cos(r(b.lat))*Math.cos(r(b.lng-a.lng));
    var brng = Math.atan2(y, x) * 180/Math.PI;
    return (brng + 360) % 360;
  },
  uuid: function() { return crypto.randomUUID(); }
};

  var pwd = prompt("Admin-Passwort:");
  if(!pwd) return;
  if(pwd === SCKR.config.adminPassword) {
    SCKR.admin.state.unlocked = true;
    SCKR.core.ui.toast("ADMIN ENTSPERRT");
    SCKR.admin.openPanel();
  } else {
    SCKR.core.ui.toast("FALSCHES PASSWORT");
  }
};

SCKR.admin.toggleTheme = function() {
  var current = document.documentElement.getAttribute("data-theme") || "dark";
  SCKR.admin.setTheme(current === "dark" ? "light" : "dark");
};

SCKR.admin.setTheme = function(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("sckr_theme", theme);
  var btn = document.getElementById("theme-btn");
  if(btn) btn.textContent = theme === "dark" ? "&#9728;" : "&#9790;";
};

SCKR.admin.applyColors = function(acc, hdr, sec) {
  var r = document.documentElement;
  if(acc) { r.style.setProperty("--club-accent", acc); r.style.setProperty("--acc", acc); }
  if(hdr) { r.style.setProperty("--club-header", hdr); r.style.setProperty("--nav", hdr); }
  if(sec) { r.style.setProperty("--club-second", sec); r.style.setProperty("--acc2", sec); }
  // Persist
  if(acc) localStorage.setItem("sckr_color_acc", acc);
  if(hdr) localStorage.setItem("sckr_color_hdr", hdr);
  if(sec) localStorage.setItem("sckr_color_sec", sec);
};

SCKR.admin.previewColors = function() {
  var acc = (document.getElementById("ad-color-acc")||{}).value;
  var hdr = (document.getElementById("ad-color-hdr")||{}).value;
  var sec = (document.getElementById("ad-color-sec")||{}).value;
  SCKR.admin.applyColors(acc, hdr, sec);
  SCKR.core.ui.toast("VORSCHAU AKTIV");
};

SCKR.admin.resetColors = function() {
  SCKR.admin.applyColors("#C8102E", "#1a1a1a", "#8B0B1F");
  localStorage.removeItem("sckr_color_acc");
  localStorage.removeItem("sckr_color_hdr");
  localStorage.removeItem("sckr_color_sec");
  SCKR.core.ui.toast("STANDARDFARBEN ZURUECK");
};

SCKR.admin.saveAll = async function() {
  var b = SCKR.admin.state.branding;
  var newText = (document.getElementById("ad-footer")||{}).value||"";
  b.colorAcc = (document.getElementById("ad-color-acc")||{}).value || b.colorAcc || "#C8102E";
  b.colorHdr = (document.getElementById("ad-color-hdr")||{}).value || b.colorHdr || "#1a1a1a";
  b.colorSec = (document.getElementById("ad-color-sec")||{}).value || b.colorSec || "#8B0B1F";
  SCKR.admin.applyColors(b.colorAcc, b.colorHdr, b.colorSec);
  b.clubName = (document.getElementById("ad-club")||{}).value||b.clubName;
  b.appTitle = (document.getElementById("ad-title")||{}).value||b.appTitle;
  SCKR.admin.state.sponsors.footer = newText ? [newText] : [];
  SCKR.config.features.fahrtenbuch = SCKR.core.ui.swVal("mod-fb");
  SCKR.config.features.regatta     = SCKR.core.ui.swVal("mod-reg");
  SCKR.config.features.sponsors    = SCKR.core.ui.swVal("mod-spon");
  SCKR.config.anthropicAPIKey = (document.getElementById("ad-claudekey")||{}).value || "";
  await SCKR.core.storage.set("admin_branding", b);
  await SCKR.core.storage.set("admin_sponsors", SCKR.admin.state.sponsors);
  await SCKR.core.storage.set("admin_features", SCKR.config.features);
  await SCKR.core.storage.set("admin_apikey", SCKR.config.anthropicAPIKey);
  SCKR.admin.applyBranding();
  SCKR.admin.renderSponsors();
  SCKR.core.ui.closeSheet();
  SCKR.core.ui.toast("GESPEICHERT");
};

SCKR.admin.addBannerSpon = async function() {
  var text = (document.getElementById("ad-spon-new")||{}).value;
  if(!text) return;
  var logo = (document.getElementById("ad-spon-logo")||{}).value||"";
  var link = (document.getElementById("ad-spon-link")||{}).value||"";
  SCKR.admin.state.sponsors.banner.push({text:text, logoUrl:logo, link:link});
  await SCKR.core.storage.set("admin_sponsors", SCKR.admin.state.sponsors);
  SCKR.admin.openPanel();
};

SCKR.admin.removeBannerSpon = async function(i) {
  SCKR.admin.state.sponsors.banner.splice(i,1);
  await SCKR.core.storage.set("admin_sponsors", SCKR.admin.state.sponsors);
  SCKR.admin.openPanel();
};

SCKR.admin.removeLogo = async function() {
  SCKR.admin.state.branding.logoB64 = "";
  await SCKR.core.storage.set("admin_branding", SCKR.admin.state.branding);
  SCKR.core.ui.applyLogo("");
  SCKR.admin.openPanel();
};

SCKR.admin.lock = function() {
  SCKR.admin.state.unlocked = false;
  SCKR.core.ui.closeSheet();
  SCKR.core.ui.toast("ADMIN GESPERRT");
};

SCKR.admin.applyBranding = function() {
  var b = SCKR.admin.state.branding;
  if(b.colorAcc || b.colorHdr || b.colorSec) {
    SCKR.admin.applyColors(b.colorAcc||"#C8102E", b.colorHdr||"#1a1a1a", b.colorSec||"#8B0B1F");
  }
  var c = document.getElementById("club-name");
  var t = document.getElementById("app-title");
  if(c) c.textContent = b.clubName;
  if(t) t.textContent = b.appTitle;
  if(b.logoB64) SCKR.core.ui.applyLogo(b.logoB64);
};

SCKR.admin.renderSponsors = function() {
  if(!SCKR.config.features.sponsors) {
    document.getElementById("sponsor-banner").style.display = "none";
    document.getElementById("footer-spon").style.display = "none";
    return;
  }
  var s = SCKR.admin.state.sponsors;
  var banner = document.getElementById("sponsor-banner");
  var footer = document.getElementById("footer-spon");
  if(s.banner.length > 0) {
    var sp = s.banner[SCKR.admin.state.sponsorIdx % s.banner.length];
    banner.style.display = "flex";
    var bt = document.getElementById("spon-banner-text");
    if(bt) {
      bt.innerHTML = (sp.logoUrl ? '<img src="'+sp.logoUrl+'" style="height:16px;width:auto;vertical-align:middle;margin-right:6px;border-radius:2px" onerror="this.style.display=\'none\'">' : '')
        + (sp.link ? '<a href="'+sp.link+'" target="_blank" style="color:var(--off);text-decoration:none">'+sp.text+'</a>' : sp.text);
    }
  } else {
    banner.style.display = "none";
  }
  if(s.footer.length > 0) {
    footer.style.display = "flex";
    document.getElementById("spon-footer-text").textContent = s.footer[0];
  } else {
    footer.style.display = "none";
  }
};

SCKR.admin.rotateSponsors = function() {
  if(!SCKR.config.features.sponsors) return;
  var s = SCKR.admin.state.sponsors;
  if(s.banner.length > 1) {
    SCKR.admin.state.sponsorIdx = (SCKR.admin.state.sponsorIdx + 1) % s.banner.length;
    SCKR.admin.renderSponsors();
  }
};

SCKR.admin.init = async function() {
  // Load saved theme
  var savedTheme = localStorage.getItem("sckr_theme") || "dark";
  document.documentElement.setAttribute("data-theme", savedTheme);

  var apik = await SCKR.core.storage.get("admin_apikey");
  if(apik) SCKR.config.anthropicAPIKey = apik;
  var b = await SCKR.core.storage.get("admin_branding");
  if(b) SCKR.admin.state.branding = b;
  var s = await SCKR.core.storage.get("admin_sponsors");
  if(s) SCKR.admin.state.sponsors = s;
  var f = await SCKR.core.storage.get("admin_features");
  if(f) { for(var k in f) SCKR.config.features[k] = f[k]; }
  SCKR.admin.applyBranding();
  SCKR.admin.renderSponsors();
  setInterval(SCKR.admin.rotateSponsors, 20000);
};

/* -- BSV 2026 Points -- */
SCKR.fahrtenbuch.points = {
  sail:    function(t) { return (t.sailKm||0) + (t.sailSm||0)*1.852; },
  motor:   function(t) { return 0.2*((t.motorKm||0) + (t.motorSm||0)*1.852); },
  bridge:  function(t) { return (t.bridges||0)*2; },
  lock:    function(t) { return (t.locks||0)*4; },
  fern:    function(t) { var d=t.fernKm||0; return d<200?0:20+Math.floor((d-200)/100)*10; },
  trailer: function(t) { return t.isTrailered?50:0; },
  comm:    function(t) { return t.isCommunity?20:0; },
  regFn:   function(t) { return t.hasRegattaFn?25:0; },
  trip:    function(t) {
    var P=SCKR.fahrtenbuch.points;
    return P.sail(t)+P.motor(t)+P.bridge(t)+P.lock(t)+P.fern(t)+P.trailer(t)+P.comm(t)+P.regFn(t);
  },
  season: function(all) {
    var P=SCKR.fahrtenbuch.points;
    var s=0,m=0,br=0,lk=0,fe=0,tr=0,co=0,rf=0,bd=0,ku=0,tu=false;
    var sorted = all.slice().sort(function(a,b){ return new Date(a.date)-new Date(b.date); });
    for (var i=0; i<sorted.length; i++) {
      var t = sorted[i];
      s+=P.sail(t); m+=P.motor(t); br+=P.bridge(t); lk+=P.lock(t); fe+=P.fern(t);
      if (t.isTrailered && !tu) { tr+=50; tu=true; }
      co+=P.comm(t); rf+=P.regFn(t);
      if (P.sail(t)>0 || P.motor(t)>0 || t.hasRegattaFn) {
        var see = (t.sailSm||0)>0 && !(t.sailKm||0);
        if (see) { if(ku<20){ku++;bd++;} } else bd++;
      }
      if (bd>=50) break;
    }
    var bl=Math.min(200,br+lk), cr=Math.min(300,co+rf);
    return {s:s,m:m,br:br,lk:lk,bl:bl,fe:fe,tr:tr,co:co,rf:rf,cr:cr,total:s+m+bl+fe+tr+cr,bd:bd,ku:ku,blOver:br+lk>200,crOver:co+rf>300};
  }
};

SCKR.fahrtenbuch.seasonRange = function(y) { return {start:new Date(Date.UTC(y-1,10,1)), end:new Date(Date.UTC(y,9,31,23,59,59))}; };
SCKR.fahrtenbuch.seasonFor = function(d) { var m=new Date(d).getUTCMonth(), y=new Date(d).getUTCFullYear(); return m>=10?y+1:y; };

    boatId:"", boatClass:"", sailNumber:"", yachtName:"",
    sailKm:0, sailSm:0, motorKm:0, motorSm:0, fernKm:0,
    bridges:0, locks:0, isTrailered:false, isCommunity:false, hasRegattaFn:false,

    trackPoints:[], infraEvents:[], segments:[], isTracked:false, notes:"",

  };

SCKR.fahrtenbuch.newBoat = function(p) {

SCKR.fahrtenbuch.boatHomePort = function(boat) {
  if (boat && boat.homePortLat && boat.homePortLon) {
    return { name: boat.homePortName||boat.name, lat: boat.homePortLat, lng: boat.homePortLon };
  }
  return { name: SCKR.fahrtenbuch.state.profile.homePortName, lat: SCKR.fahrtenbuch.state.profile.homePortLat, lng: SCKR.fahrtenbuch.state.profile.homePortLon };
};

SCKR.fahrtenbuch.getActiveBoat = function() {
  var st = SCKR.fahrtenbuch.state;
  if(st.selectedBoatId) {
    for(var i=0;i<st.boats.length;i++) if(st.boats[i].id===st.selectedBoatId) return st.boats[i];
  }
  return st.boats[0] || null;
};

SCKR.fahrtenbuch.getRouteSuggestions = function() {
  var st = SCKR.fahrtenbuch.state;
  var fromTrips = [];
  for(var i=0; i<Math.min(st.trips.length,10); i++) {
    if(st.trips[i].description && fromTrips.indexOf(st.trips[i].description)===-1) fromTrips.push(st.trips[i].description);
  }
  var all = fromTrips.concat(SCKR.fahrtenbuch.defaultRoutes);
  var unique = [];
  for(var j=0;j<all.length;j++) { if(unique.indexOf(all[j])===-1) unique.push(all[j]); }
  return unique.slice(0,8);
};

  BFT_LIM: [0.3,1.6,3.4,5.5,8,10.8,13.9,17.2,20.8,24.5,28.5,32.7],
  msToBft: function(v) { var L=SCKR.fahrtenbuch.weather.BFT_LIM; for(var i=0;i<L.length;i++) if(v<L[i]) return i; return 12; },
  degToDir: function(d) { return SCKR.fahrtenbuch.weather.DIRS[Math.floor(((d+11.25)%360)/22.5)]; },

  fieldsHTML: function(t) {
    var DIRS=SCKR.fahrtenbuch.weather.DIRS;
    var wd=(t&&t.windDir)||"";
    var wf=(t&&t.windForce)||"";
    var wc=(t&&t.cloudiness)||"";
    var esc=SCKR.core.fmt.esc;
    var dirOpts = DIRS.map(function(d){ return '<option'+(wd===d?' selected':'')+'>'+d+'</option>'; }).join("");
    dirOpts += '<option'+(DIRS.indexOf(wd)===-1?' selected':'')+' value="">-</option>';
    var bftOpts = "";
    for(var i=0;i<=12;i++) bftOpts += '<option'+(wf===i+" Bft"?' selected':'')+'>'+i+' Bft</option>';
    return '<div class="g2"><div class="fld"><label class="lbl">Windrichtung</label><select class="inp" id="w-dir">'+dirOpts+'</select></div>'
      +'<div class="fld"><label class="lbl">Windstaerke</label><select class="inp" id="w-bft">'+bftOpts+'</select></div></div>'
      +'<div class="fld"><label class="lbl">Bewoelkung</label><input class="inp" id="w-cloud" value="'+esc(wc)+'" placeholder="z. B. 40 %"></div>';
  },
  stripHTML: function(t) {
    var wd=(t&&t.windDir)||"-", wf=(t&&t.windForce)||"-", wc=(t&&t.cloudiness)||"-";
    var esc=SCKR.core.fmt.esc;
    return '<div class="wx-strip"><div class="wx-item"><div class="wx-val">'+esc(wd)+'</div><div class="wx-lbl">WIND</div></div>'
      +'<div class="wx-item"><div class="wx-val">'+esc(wf)+'</div><div class="wx-lbl">STAERKE</div></div>'
      +'<div class="wx-item"><div class="wx-val">'+esc(wc.split("/")[0]||wc)+'</div><div class="wx-lbl">WOLKEN</div></div></div>';
  },
  readFromFields: function() {
    return {
      windDir: (document.getElementById("w-dir")||{}).value||"",
      windForce: (document.getElementById("w-bft")||{}).value||"",
      cloudiness: (document.getElementById("w-cloud")||{}).value||""
    };
  },
  fetchCurrent: function(cb) {
    if (!navigator.geolocation) { if(cb) cb(null); return; }
    navigator.geolocation.getCurrentPosition(function(pos) {
      var lat=pos.coords.latitude, lng=pos.coords.longitude;
      var day=new Date().toISOString().slice(0,10);
      fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lng+"&hourly=precipitation,cloud_cover,wind_speed_10m,wind_direction_10m&wind_speed_unit=ms&timezone=auto&start_date="+day+"&end_date="+day)
      .then(function(r){return r.json();})
      .then(function(d){
        var now=new Date(), bi=0, bd=Infinity;
        var times=(d.hourly&&d.hourly.time)||[];
        for(var i=0;i<times.length;i++){ var dt=Math.abs(new Date(times[i])-now); if(dt<bd){bd=dt;bi=i;} }
        var wx={
          windDir: SCKR.fahrtenbuch.weather.degToDir(d.hourly.wind_direction_10m[bi]),
          windForce: SCKR.fahrtenbuch.weather.msToBft(d.hourly.wind_speed_10m[bi])+" Bft",
          cloudiness: d.hourly.cloud_cover[bi]+" %"+(d.hourly.precipitation[bi]>0?" / "+d.hourly.precipitation[bi].toFixed(1)+" mm":"")
        };
        SCKR.fahrtenbuch.state.currentWeather = wx;
        if(cb) cb(wx);
      }).catch(function(){ if(cb) cb(null); });
    }, function(){ if(cb) cb(null); }, {enableHighAccuracy:true, timeout:10000});
  }
};

SCKR.fahrtenbuch.autoWeather = function() {
  SCKR.core.ui.toast("WETTER WIRD GELADEN...");
  SCKR.fahrtenbuch.weather.fetchCurrent(function(wx) {
    if(!wx) { SCKR.core.ui.toast("WETTER NICHT VERFUEGBAR"); return; }
    var dir=document.getElementById("w-dir");
    var bft=document.getElementById("w-bft");
    var cl=document.getElementById("w-cloud");
    if(dir) dir.value=wx.windDir;
    if(bft) bft.value=wx.windForce;
    if(cl)  cl.value=wx.cloudiness;
    SCKR.core.ui.toast("WETTER: "+wx.windDir+" "+wx.windForce);
  });
};

/* -- Persistence -- */
SCKR.fahrtenbuch.saveTrip = async function(t) {
  var st = SCKR.fahrtenbuch.state;
  var idx = -1;
  for(var i=0;i<st.trips.length;i++) { if(st.trips[i].id===t.id){idx=i;break;} }
  if(idx>=0) st.trips[idx]=t; else st.trips.unshift(t);
  st.trips.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  await SCKR.core.storage.set("trip:"+t.id, t);
};

SCKR.fahrtenbuch.deleteTrip = async function(id) {
  var st = SCKR.fahrtenbuch.state;
  await SCKR.core.storage.del("trip:"+id);
  st.trips = st.trips.filter(function(t){return t.id!==id;});
};

/* -- GPS Permission -- */
SCKR.fahrtenbuch.requestGPS = function() {
  if(!navigator.geolocation) { SCKR.core.ui.toast("GPS NICHT VERFUEGBAR"); return; }
  SCKR.core.ui.toast("GPS WIRD ANGEFRAGT...");
  navigator.geolocation.getCurrentPosition(function(pos){
    var st = SCKR.fahrtenbuch.state;
    st.gpsGranted = true;
    st.currentPos = {lat:pos.coords.latitude, lng:pos.coords.longitude};
    SCKR.core.ui.toast("GPS AKTIV");
    SCKR.fahrtenbuch.startPosWatch();
    if(st.profile.autoTrack) SCKR.fahrtenbuch.startGeofence();
    SCKR.fahrtenbuch.weather.fetchCurrent(function(wx){
      if(wx && SCKR.core.currentTab==="live") SCKR.fahrtenbuch.render.live();
    });
    SCKR.fahrtenbuch.render.live();
  }, function(err){
    var msg="GPS FEHLER";
    if(err.code===1) msg="GPS VERWEIGERT - iPhone Einstellungen pruefen";
    if(err.code===2) msg="GPS NICHT VERFUEGBAR";
    if(err.code===3) msg="GPS TIMEOUT";
    SCKR.core.ui.toast(msg, 5000);
  }, {enableHighAccuracy:true, timeout:15000, maximumAge:0});
};

/* -- Continuous position watch -- */
SCKR.fahrtenbuch.posWatch = null;
SCKR.fahrtenbuch.startPosWatch = function() {
  if(!navigator.geolocation || SCKR.fahrtenbuch.posWatch) return;
  SCKR.fahrtenbuch.posWatch = navigator.geolocation.watchPosition(function(pos) {
    var st = SCKR.fahrtenbuch.state;
    var newPos = {lat:pos.coords.latitude, lng:pos.coords.longitude};
    // Calculate heading if moving
    if(st.currentPos && SCKR.core.util.haversine(st.currentPos, newPos)*1000 > 3) {
      st.currentHeading = SCKR.core.util.bearing(st.currentPos, newPos);
    }
    st.currentPos = newPos;
    st.currentSpeed = pos.coords.speed || 0;
    if(st.currentSpeed > st.maxSpeed) st.maxSpeed = st.currentSpeed;

    // Update map marker
    if(SCKR.fahrtenbuch.render.mapInst && SCKR.fahrtenbuch.render.posMarker) {
      SCKR.fahrtenbuch.render.posMarker.setLatLng([newPos.lat, newPos.lng]);
    }
    // Update live display during tracking
    if(st.tracking && SCKR.core.currentTab==="live") {
      SCKR.fahrtenbuch.render.updateLiveGauges();
    }
  }, function(){}, {enableHighAccuracy:true, maximumAge:3000, timeout:30000});
};

/* -- Tracking -- */
SCKR.fahrtenbuch.startTracking = async function(prefill) {
  var st = SCKR.fahrtenbuch.state;
  var trip = SCKR.fahrtenbuch.newTrip(prefill);
  trip.startTime = new Date().toISOString();
  trip.isTracked = true;
  st.activeTrip = trip;
  st.trackPts = [];
  st.infraEvs = [];
  st.liveKm = 0;
  st.elapsed = 0;
  st.maxSpeed = 0;
  st.tracking = true;
  st.propulsionMode = "Segel";  // Default
  st.currentSegment = {mode:"Segel", startIdx:0, km:0};
  st.startT = Date.now();
  SCKR.core.ui.closeSheet();

  st.timerId = setInterval(function() {
    st.elapsed = Math.floor((Date.now()-st.startT)/1000);
    var km=0;
    for(var i=1;i<st.trackPts.length;i++) km += SCKR.core.util.haversine(st.trackPts[i-1], st.trackPts[i]);
    st.liveKm = km;
    if(SCKR.core.currentTab==="live") SCKR.fahrtenbuch.render.updateLiveGauges();
  }, 1000);

  if(navigator.geolocation) {
    st.watchId = navigator.geolocation.watchPosition(function(pos) {
      if(pos.coords.accuracy>60) return;
      st.gpsGranted = true;
      var pt = {t:new Date(pos.timestamp).toISOString(), lat:pos.coords.latitude, lng:pos.coords.longitude, speed:pos.coords.speed||0, mode:st.propulsionMode};
      var last = st.trackPts.length>0 ? st.trackPts[st.trackPts.length-1] : null;
      if(last && SCKR.core.util.haversine(last,pt)*1000 < 3) return;
      st.trackPts.push(pt);
      if(st.currentSegment) st.currentSegment.km += last ? SCKR.core.util.haversine(last,pt) : 0;
      // Update speed & heading
      st.currentSpeed = pos.coords.speed || 0;
      if(st.currentSpeed > st.maxSpeed) st.maxSpeed = st.currentSpeed;
      if(last) st.currentHeading = SCKR.core.util.bearing(last, pt);
      st.currentPos = {lat:pt.lat, lng:pt.lng};
      // Update map
      if(SCKR.fahrtenbuch.render.mapInst) {
        if(SCKR.fahrtenbuch.render.trackLine) {
          SCKR.fahrtenbuch.render.trackLine.addLatLng([pt.lat, pt.lng]);
        }
        if(SCKR.fahrtenbuch.render.posMarker) {
          SCKR.fahrtenbuch.render.posMarker.setLatLng([pt.lat, pt.lng]);
        }
      }
    }, function(err){ SCKR.core.ui.toast("GPS: "+err.message); }, {enableHighAccuracy:true, maximumAge:1000, timeout:30000});
  } else {
    SCKR.core.ui.toast("GPS NICHT VERFUEGBAR");
  }

  await SCKR.fahrtenbuch.saveTrip(trip);
  SCKR.fahrtenbuch.render.live();
};

SCKR.fahrtenbuch.toggleProp = function(mode) {
  var st = SCKR.fahrtenbuch.state;
  if(!st.tracking || !st.activeTrip) return;
  // Close current segment
  if(st.currentSegment) {
    st.currentSegment.endIdx = st.trackPts.length-1;
    if(!st.activeTrip.segments) st.activeTrip.segments = [];
    st.activeTrip.segments.push({mode: st.currentSegment.mode, km: st.currentSegment.km, startIdx: st.currentSegment.startIdx, endIdx: st.currentSegment.endIdx});
  }
  // Start new segment
  st.propulsionMode = mode;
  st.currentSegment = {mode:mode, startIdx: st.trackPts.length, km:0};
  SCKR.core.ui.toast(mode==="Motor" ? "MOTOR EIN" : "SEGEL EIN");
  SCKR.fahrtenbuch.render.updateLiveGauges();
};

SCKR.fahrtenbuch.stopTracking = async function() {
  var st = SCKR.fahrtenbuch.state;
  if(st.watchId!==null) { navigator.geolocation.clearWatch(st.watchId); st.watchId=null; }
  clearInterval(st.timerId);
  if(!st.activeTrip) return;

  // Close final segment
  if(st.currentSegment) {
    st.currentSegment.endIdx = st.trackPts.length-1;
    if(!st.activeTrip.segments) st.activeTrip.segments = [];
    st.activeTrip.segments.push({mode: st.currentSegment.mode, km: st.currentSegment.km, startIdx: st.currentSegment.startIdx, endIdx: st.currentSegment.endIdx});
  }

  st.activeTrip.endTime = new Date().toISOString();
  st.activeTrip.trackPoints = st.trackPts;
  st.activeTrip.infraEvents = st.infraEvs;
  st.activeTrip.maxSpeed = st.maxSpeed;

  // Calculate sail/motor km from segments
  var sailKm=0, motorKm=0;
  for(var i=0;i<st.activeTrip.segments.length;i++) {
    var seg = st.activeTrip.segments[i];
    if(seg.mode==="Motor") motorKm += seg.km;
    else sailKm += seg.km;
  }
  sailKm = Math.round(sailKm*100)/100;
  motorKm = Math.round(motorKm*100)/100;

  if(st.activeTrip.category==="Binnen") {
    st.activeTrip.sailKm = sailKm;
    st.activeTrip.motorKm = motorKm;
  } else {
    st.activeTrip.sailSm = Math.round(sailKm/1.852*100)/100;
    st.activeTrip.motorSm = Math.round(motorKm/1.852*100)/100;
  }

  st.tracking = false;
  var saved = st.activeTrip;
  st.activeTrip = null;
  st.currentSegment = null;

  await SCKR.fahrtenbuch.saveTrip(saved);
  SCKR.core.ui.toast("FAHRT GESPEICHERT - OSM & WETTER LADEN...");
  SCKR.core.events.emit("trip:saved", saved);

  SCKR.fahrtenbuch.detectOSM(saved).then(function(){ SCKR.fahrtenbuch.saveTrip(saved); }).catch(function(){});
  SCKR.fahrtenbuch.fetchTripWeather(saved, function(t){ if(t) SCKR.fahrtenbuch.saveTrip(t); });

  if(st.profile.autoSync && st.profile.cloudApiKey) SCKR.fahrtenbuch.cloud.sync(true);
  SCKR.fahrtenbuch.render.live();
};

SCKR.fahrtenbuch.tagInfra = function(type) {
  var st = SCKR.fahrtenbuch.state;
  if(!st.activeTrip || st.trackPts.length===0) { SCKR.core.ui.toast("KEINE GPS-POSITION"); return; }
  var last = st.trackPts[st.trackPts.length-1];
  st.infraEvs.push({id:SCKR.core.util.uuid(),type:type,t:new Date().toISOString(),lat:last.lat,lng:last.lng,name:"",auto:false});
  if(type==="Bruecke") st.activeTrip.bridges = (st.activeTrip.bridges||0)+1;
  else st.activeTrip.locks = (st.activeTrip.locks||0)+1;
  SCKR.core.ui.toast(type+" EINGETRAGEN");
};

/* -- Geofence -- */
SCKR.fahrtenbuch.distHome = function(lat,lng,boat) {
  var hp = boat ? SCKR.fahrtenbuch.boatHomePort(boat) : {lat:SCKR.fahrtenbuch.state.profile.homePortLat, lng:SCKR.fahrtenbuch.state.profile.homePortLon};
  return SCKR.core.util.haversine({lat:lat,lng:lng}, {lat:hp.lat,lng:hp.lng})*1000;
};

SCKR.fahrtenbuch.startGeofence = function() {
  var st = SCKR.fahrtenbuch.state;
  if(!navigator.geolocation || !st.profile.autoTrack) { st.geoState="off"; return; }
  if(st.geoWatchId !== null) return;
  st.geoState="watching";
  st.geoWatchId = navigator.geolocation.watchPosition(function(pos) {
    if(pos.coords.accuracy>80) return;
    var activeBoat = SCKR.fahrtenbuch.getActiveBoat();
    var d = SCKR.fahrtenbuch.distHome(pos.coords.latitude, pos.coords.longitude, activeBoat);
    st.geoLastDist = Math.round(d);

    // Water check: need to be actually moving (speed > 0.3 m/s = 0.6 knots)
    var isMoving = (pos.coords.speed || 0) > 0.3;

    if(!st.tracking && d > (st.profile.geoStartM||200) && isMoving) {
      st.geoState="away"; st.geoAutoStarted=true;
      var b = activeBoat || {};
      SCKR.fahrtenbuch.startTracking({
        category: b.category || st.profile.defaultCategory,
        boatId: b.id || "",
        boatClass: b.boatClass || "",
        sailNumber: b.sailNumber || "",
        yachtName: b.name || "",
        description: "Auto-Start (Geofence)"
      });
      SCKR.core.ui.toast("AUTO-START "+Math.round(d)+"m");
    } else if(st.tracking && st.geoAutoStarted && d < (st.profile.geoStopM||100)) {
      st.geoState="watching"; st.geoAutoStarted=false;
      SCKR.fahrtenbuch.stopTracking();
      SCKR.core.ui.toast("AUTO-STOP");
    }
    if(SCKR.core.currentTab==="live") SCKR.fahrtenbuch.render.live();
  }, function(){}, {enableHighAccuracy:true, maximumAge:15000, timeout:60000});
};

SCKR.fahrtenbuch.stopGeofence = function() {
  var st = SCKR.fahrtenbuch.state;
  if(st.geoWatchId !== null) { navigator.geolocation.clearWatch(st.geoWatchId); st.geoWatchId=null; }
  st.geoState="off"; st.geoLastDist=null;
};

/* -- OSM detection -- */
SCKR.fahrtenbuch.detectOSM = async function(trip) {
  var pts = trip.trackPoints;
  if(!pts || pts.length<2) return;
  var lats=[], lons=[];
  for(var i=0;i<pts.length;i++) { lats.push(pts[i].lat); lons.push(pts[i].lng); }
  var buf = 200/111000;
  var minLat = Math.min.apply(null,lats)-buf, maxLat = Math.max.apply(null,lats)+buf;
  var minLon = Math.min.apply(null,lons)-buf, maxLon = Math.max.apply(null,lons)+buf;
  var q = '[out:json][timeout:45];(node["waterway"="lock_gate"]('+minLat+','+minLon+','+maxLat+','+maxLon+');way["lock"="yes"]('+minLat+','+minLon+','+maxLat+','+maxLon+');way["man_made"="bridge"]('+minLat+','+minLon+','+maxLat+','+maxLon+');way["bridge"]["highway"]('+minLat+','+minLon+','+maxLat+','+maxLon+'););out center tags;';
  try {
    var r = await fetch("https://overpass-api.de/api/interpreter", {method:"POST", body:"data="+encodeURIComponent(q)});
    if(!r.ok) return;
    var data = await r.json();
    if(!trip.infraEvents) trip.infraEvents = [];
    var ex = {};
    for(var j=0;j<trip.infraEvents.length;j++) {
      var e = trip.infraEvents[j];
      ex[e.lat.toFixed(4)+";"+e.lng.toFixed(4)+";"+e.type] = true;
    }
    var elems = data.elements || [];
    for(var k=0;k<elems.length;k++) {
      var el = elems[k];
      var lat = el.lat || (el.center && el.center.lat);
      var lon = el.lon || (el.center && el.center.lon);
      if(!lat || !lon) continue;
      var tags = el.tags || {};
      var type;
      if(tags.lock==="yes" || tags.waterway==="lock_gate") type = "Schleuse";
      else if(tags.bridge || tags.man_made==="bridge") type = "Bruecke";
      else continue;
      var minD = Infinity, nearT = new Date().toISOString();
      for(var p=0;p<pts.length;p++) {
        var dd = SCKR.core.util.haversine(pts[p], {lat:lat,lng:lon})*1000;
        if(dd<minD) { minD=dd; nearT=pts[p].t; }
      }
      if(minD > 40) continue;
      var key = lat.toFixed(4)+";"+lon.toFixed(4)+";"+type;
      if(ex[key]) continue;
      trip.infraEvents.push({id:SCKR.core.util.uuid(), type:type, t:nearT, lat:lat, lng:lon, name:tags.name||"", auto:true});
      ex[key] = true;
    }
    trip.bridges = trip.infraEvents.filter(function(e){return e.type==="Bruecke";}).length;
    trip.locks = trip.infraEvents.filter(function(e){return e.type==="Schleuse";}).length;
  } catch(e) {}
};

SCKR.fahrtenbuch.fetchTripWeather = function(trip, cb) {
  var pts = trip.trackPoints;
  var lat = SCKR.fahrtenbuch.state.profile.homePortLat;
  var lng = SCKR.fahrtenbuch.state.profile.homePortLon;
  if (pts && pts.length > 0) { var mid=pts[Math.floor(pts.length/2)]; lat=mid.lat; lng=mid.lng; }
  var st = trip.startTime || (trip.date+"T10:00:00Z");
  var et = trip.endTime || (trip.date+"T16:00:00Z");
  var midT = new Date((new Date(st).getTime()+new Date(et).getTime())/2);
  var day = trip.date;
  fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lng+"&hourly=precipitation,cloud_cover,wind_speed_10m,wind_direction_10m&wind_speed_unit=ms&timezone=UTC&start_date="+day+"&end_date="+day)
  .then(function(r){return r.json();})
  .then(function(d){
    var bi=0, bd=Infinity;
    var times = (d.hourly && d.hourly.time) || [];
    for(var i=0;i<times.length;i++) { var dt=Math.abs(new Date(times[i]+"Z")-midT); if(dt<bd){bd=dt;bi=i;} }
    trip.cloudiness = d.hourly.cloud_cover[bi]+" %"+(d.hourly.precipitation[bi]>0?" / "+d.hourly.precipitation[bi].toFixed(1)+" mm":"");
    trip.windDir = SCKR.fahrtenbuch.weather.degToDir(d.hourly.wind_direction_10m[bi]);
    trip.windForce = SCKR.fahrtenbuch.weather.msToBft(d.hourly.wind_speed_10m[bi])+" Bft";
    if(cb) cb(trip);
  }).catch(function(){ if(cb) cb(null); });
};

SCKR.fahrtenbuch.render = {

// Compass SVG
SCKR.fahrtenbuch.render.compassSVG = function(heading) {
  var h = heading || 0;
  return '<svg class="compass" viewBox="0 0 100 100">'
    + '<defs><radialGradient id="cbg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#163555"/><stop offset="100%" stop-color="#03101e"/></radialGradient></defs>'
    + '<circle cx="50" cy="50" r="46" fill="url(#cbg)" stroke="#C8A84B" stroke-width="1.5"/>'
    + '<circle cx="50" cy="50" r="40" fill="none" stroke="#8C7030" stroke-width=".5" opacity=".5"/>'
    // Cardinal marks
    + '<text x="50" y="15" text-anchor="middle" fill="#C8A84B" font-family="Barlow Condensed" font-size="9" font-weight="800">N</text>'
    + '<text x="88" y="54" text-anchor="middle" fill="#8C7030" font-family="Barlow Condensed" font-size="8" font-weight="700">O</text>'
    + '<text x="50" y="92" text-anchor="middle" fill="#8C7030" font-family="Barlow Condensed" font-size="8" font-weight="700">S</text>'
    + '<text x="12" y="54" text-anchor="middle" fill="#8C7030" font-family="Barlow Condensed" font-size="8" font-weight="700">W</text>'
    // Heading needle
    + '<g transform="rotate('+h+' 50 50)">'
    + '<path d="M 50 12 L 45 50 L 55 50 Z" fill="#1AABA0" stroke="#fff" stroke-width=".5"/>'

// SVG fallback track
SCKR.fahrtenbuch.render.trackSVG = function(pts, evs) {
  if(!pts || pts.length<2) return '<div style="height:180px;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:13px">KEIN GPS-TRACK</div>';
  var lats=[], lons=[];
  for(var i=0;i<pts.length;i++) { lats.push(pts[i].lat); lons.push(pts[i].lng); }
  var minLat=Math.min.apply(null,lats), maxLat=Math.max.apply(null,lats)||minLat+.001;
  var minLon=Math.min.apply(null,lons), maxLon=Math.max.apply(null,lons)||minLon+.001;
  var W=300, H=180, pad=14;
  var tx = function(lon){ return pad+(lon-minLon)/(maxLon-minLon)*(W-2*pad); };
  var ty = function(lat){ return H-pad-(lat-minLat)/(maxLat-minLat)*(H-2*pad); };
  // Separate path by propulsion mode
  var segSail = "", segMotor = "";
  var curMode = null, curPath = "";
  for(var j=0;j<pts.length;j++) {
    var p = pts[j];
    var cmd = (j===0 || curMode!==p.mode) ? "M" : "L";
    if(j===0 || curMode!==p.mode) {
      if(curPath) {
        if(curMode==="Motor") segMotor += curPath; else segSail += curPath;
      }
      curMode = p.mode || "Segel";
      curPath = "M"+tx(p.lng).toFixed(1)+","+ty(p.lat).toFixed(1);
    } else {
      curPath += " L"+tx(p.lng).toFixed(1)+","+ty(p.lat).toFixed(1);
    }
  }
  if(curPath) {
    if(curMode==="Motor") segMotor += curPath; else segSail += curPath;
  }
  var dots = "";
  if(evs) for(var k=0;k<evs.length;k++) dots += '<circle cx="'+tx(evs[k].lng).toFixed(1)+'" cy="'+ty(evs[k].lat).toFixed(1)+'" r="5" fill="#C8A84B" stroke="#03101e" stroke-width="1.5"/>';
  return '<div class="track-wrap"><svg class="track" viewBox="0 0 '+W+' '+H+'">'
    + (segSail?'<path d="'+segSail+'" fill="none" stroke="#1AABA0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>':'')
    + (segMotor?'<path d="'+segMotor+'" fill="none" stroke="#e67e22" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>':'')
    + '<circle cx="'+tx(pts[0].lng).toFixed(1)+'" cy="'+ty(pts[0].lat).toFixed(1)+'" r="5" fill="#1A8A50" stroke="#03101e" stroke-width="2"/>'
    + '<circle cx="'+tx(pts[pts.length-1].lng).toFixed(1)+'" cy="'+ty(pts[pts.length-1].lat).toFixed(1)+'" r="5" fill="#C8A84B" stroke="#03101e" stroke-width="2"/>'
    + dots + '</svg></div>';
};

SCKR.fahrtenbuch.render.destroyMap = function() {
  var R = SCKR.fahrtenbuch.render;
  if(R.mapInst) {
    try { R.mapInst.remove(); } catch(e) {}
    R.mapInst = null;
    R.posMarker = null;
    R.homeMarker = null;
    R.trackLine = null;
  }
};

SCKR.fahrtenbuch.render.showMap = function(containerId, pts, evs) {
  var R = SCKR.fahrtenbuch.render;
  var st = SCKR.fahrtenbuch.state;
  var container = document.getElementById(containerId);
  if(!container) return;
  R.destroyMap();
  container.innerHTML = "";
  container.style.height = "220px";
  container.style.minHeight = "220px";
  container.style.width = "100%";
  container.style.display = "block";

  // Leaflet not loaded? Use SVG fallback
  if(typeof L === "undefined") {
    container.innerHTML = R.trackSVG(pts, evs);
    return;
  }

  try {
    var activeBoat = SCKR.fahrtenbuch.getActiveBoat();
    var hp = activeBoat ? SCKR.fahrtenbuch.boatHomePort(activeBoat) : {lat:st.profile.homePortLat,lng:st.profile.homePortLon,name:"Heimathafen"};
    var hasPts = pts && pts.length >= 2;
    var center = [hp.lat, hp.lng];
    var zoom = 14;
    if(st.currentPos) { center = [st.currentPos.lat, st.currentPos.lng]; }

    R.mapInst = L.map(container, {zoomControl:true, attributionControl:false, tap:true}).setView(center, zoom);

    // OSM with fallback
    var tiles = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {opacity:0.9, maxZoom:18});
    var fallbackApplied = false;
    tiles.on("tileerror", function() {
      if(fallbackApplied) return;
      fallbackApplied = true;
      // Use CartoDB dark as fallback
      L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png", {opacity:0.9, maxZoom:18}).addTo(R.mapInst);
    });
    tiles.addTo(R.mapInst);

    // Home port
    if(hp.lat && hp.lng) {
      R.homeMarker = L.circleMarker([hp.lat, hp.lng], {radius:7,color:"#C8A84B",fillColor:"#C8A84B",fillOpacity:0.7,weight:2}).bindPopup("Heimathafen: "+SCKR.core.fmt.esc(hp.name)).addTo(R.mapInst);
    }

    // Current position
    if(st.currentPos) {
      R.posMarker = L.circleMarker([st.currentPos.lat,st.currentPos.lng], {radius:9,color:"#fff",fillColor:"#1AABA0",fillOpacity:1,weight:2}).bindPopup("Mein Standort").addTo(R.mapInst);
    }

    // Track
    if(hasPts) {
      var coords = pts.map(function(p){ return [p.lat,p.lng]; });
      R.trackLine = L.polyline(coords, {color:"#1AABA0", weight:3, opacity:0.9}).addTo(R.mapInst);
      L.circleMarker(coords[0], {radius:7,color:"#fff",fillColor:"#1A8A50",fillOpacity:1,weight:2}).bindPopup("Start").addTo(R.mapInst);
      L.circleMarker(coords[coords.length-1], {radius:7,color:"#fff",fillColor:"#C8A84B",fillOpacity:1,weight:2}).bindPopup("Ende").addTo(R.mapInst);
      R.mapInst.fitBounds(coords, {padding:[25,25]});
    }

    // Infrastructure markers
    if(evs) {
      for(var i=0;i<evs.length;i++) {
        L.circleMarker([evs[i].lat,evs[i].lng],{radius:5,color:"#E2C46A",fillColor:"#E2C46A",fillOpacity:1}).bindPopup(SCKR.core.fmt.esc(evs[i].type)+(evs[i].name?" ("+SCKR.core.fmt.esc(evs[i].name)+")":"")).addTo(R.mapInst);
      }
    }

    // Force resize
    setTimeout(function(){ if(R.mapInst) R.mapInst.invalidateSize(true); }, 300);
    setTimeout(function(){ if(R.mapInst) R.mapInst.invalidateSize(true); }, 800);

  } catch(e) {
    container.innerHTML = R.trackSVG(pts, evs);
  }
};

SCKR.fahrtenbuch.render.trips = function() {

  var el = document.getElementById("trips");
  var esc = SCKR.core.fmt.esc;

  var filtered = st.trips;
  if(st.filterYear!=="all") filtered = filtered.filter(function(t){ return new Date(t.date).getFullYear()===parseInt(st.filterYear); });
  if(st.filterMonth!=="all") filtered = filtered.filter(function(t){ return new Date(t.date).getMonth()===parseInt(st.filterMonth); });

  var years = {};
  for(var i=0;i<st.trips.length;i++) years[new Date(st.trips[i].date).getFullYear()] = true;
  var yk = Object.keys(years).sort().reverse();

  var monthNames = ["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  var monthOpts = '<option value="all">Alle Monate</option>';
  for(var m=0;m<12;m++) monthOpts += '<option value="'+m+'"'+(st.filterMonth===String(m)?' selected':'')+'>'+monthNames[m]+'</option>';

    + '<select onchange="SCKR.fahrtenbuch.state.filterMonth=this.value;SCKR.fahrtenbuch.render.trips()">'+monthOpts+'</select></div>';

  var rows = [["Segel-km",s.s],["Motor x 0.2",s.m],["Bruecken",s.br],["Schleusen",s.lk]];
  html += '<div class="pnl"><div class="phd"><span class="phd-t">Aufschluesselung</span></div>';
  for(var j=0;j<rows.length;j++) html += '<div class="prow"><span class="lv">'+rows[j][0]+'</span><span class="rv">'+Math.round(rows[j][1])+'</span></div>';
  if(s.blOver) html += '<div class="warn">Bruecken+Schleusen auf 200 gedeckelt (waren '+Math.round(s.br+s.lk)+')</div>';
  var rows2 = [["Fernfahrt",s.fe],["Trailer",s.tr],["Gemeinschaft",s.co],["Regatta-Funktion",s.rf]];
  for(var k=0;k<rows2.length;k++) html += '<div class="prow"><span class="lv">'+rows2[k][0]+'</span><span class="rv">'+Math.round(rows2[k][1])+'</span></div>';
  if(s.crOver) html += '<div class="warn">Gemeinschaft+Funktion auf 300 gedeckelt</div>';
  html += '</div>';

  html += '<div class="pnl"><div class="phd"><span class="phd-t">Bordtage</span></div>'
    + '<div class="prow"><span class="lv">Bordtage gesamt (max. 50)</span><span class="rv">'+s.bd+'</span></div>'
    + '<div class="prow"><span class="lv">davon Kueste (max. 20)</span><span class="rv">'+s.ku+'</span></div>'
    + '<div class="prow"><span class="lv">Zeitraum</span><span class="rv" style="font-size:12px">'+df(range.start)+' - '+df(range.end)+'</span></div></div>';

  html += '<div class="pnl"><div class="phd"><span class="phd-t">Export &amp; Regelwerk</span></div>'
    + '<div style="padding:14px;display:flex;flex-direction:column;gap:10px">'
    + '<button class="btn btn-gold" type="button" onclick="SCKR.fahrtenbuch.exportExcel()">EXCEL-EXPORT (BSV VORLAGE)</button>'
    + '<a href="'+SCKR.config.regelwerkURL+'" target="_blank" class="btn btn-ghost" style="text-decoration:none;text-align:center">BSV REGELWERK 2026 (PDF)</a>'
    + '</div></div>';

  document.getElementById("stats").innerHTML = html;
};

SCKR.fahrtenbuch.savePf = async function() {
  var st = SCKR.fahrtenbuch.state;
  var g = function(id){ return document.getElementById(id); };
  st.profile.name = (g("pf-name")||{}).value||st.profile.name;
  st.profile.age = +(g("pf-age")||{}).value||0;
  st.profile.geoStartM = +(g("pf-gst")||{}).value||200;
  st.profile.geoStopM = +(g("pf-gsp")||{}).value||100;
  st.profile.cloudApiKey = (g("pf-ckey")||{}).value||st.profile.cloudApiKey;
  st.profile.cloudBinId = (g("pf-cbin")||{}).value||st.profile.cloudBinId;
  await SCKR.core.storage.set("profile", st.profile);
  SCKR.fahrtenbuch.cloud.startAuto();
  SCKR.core.ui.toast("GESPEICHERT");
};

SCKR.fahrtenbuch.saveNewBoat = async function() {
  var st = SCKR.fahrtenbuch.state;
  var name = (document.getElementById("nb-name")||{}).value||"Boot";
  var b = SCKR.fahrtenbuch.newBoat({
    name: name,
    category: (document.getElementById("nb-cat")||{}).value,
    boatClass: (document.getElementById("nb-cls")||{}).value,
    sailNumber: (document.getElementById("nb-sn")||{}).value,
    homePortName: (document.getElementById("nb-pname")||{}).value||"",
    homePortLat: +(document.getElementById("nb-plat")||{}).value||0,
    homePortLon: +(document.getElementById("nb-plon")||{}).value||0
  });
  st.boats.push(b);
  await SCKR.core.storage.set("boats", st.boats);
  SCKR.core.ui.closeSheet();
  SCKR.fahrtenbuch.render.settings();
  SCKR.core.ui.toast("BOOT ANGELEGT");
};

SCKR.fahrtenbuch.setBoatHomeToPos = function() {
  if(!navigator.geolocation) { SCKR.core.ui.toast("GPS NICHT VERFUEGBAR"); return; }
  navigator.geolocation.getCurrentPosition(function(pos) {
    var latEl = document.getElementById("nb-plat") || document.getElementById("eb-plat");
    var lonEl = document.getElementById("nb-plon") || document.getElementById("eb-plon");
    if(latEl) latEl.value = pos.coords.latitude.toFixed(5);
    if(lonEl) lonEl.value = pos.coords.longitude.toFixed(5);
    SCKR.core.ui.toast("STANDORT GESETZT");
  }, function(){ SCKR.core.ui.toast("GPS NICHT VERFUEGBAR"); }, {enableHighAccuracy:true, timeout:10000});
};

SCKR.fahrtenbuch.saveEditBoat = async function(id) {
  var st = SCKR.fahrtenbuch.state;
  var b = null;
  for(var i=0;i<st.boats.length;i++) if(st.boats[i].id===id) { b = st.boats[i]; break; }

  b.name = (document.getElementById("eb-name")||{}).value||b.name;
  b.category = (document.getElementById("eb-cat")||{}).value;

  b.sailNumber = (document.getElementById("eb-sn")||{}).value;
  b.homePortName = (document.getElementById("eb-pname")||{}).value||"";
  b.homePortLat = +(document.getElementById("eb-plat")||{}).value||0;
  b.homePortLon = +(document.getElementById("eb-plon")||{}).value||0;
  await SCKR.core.storage.set("boats", st.boats);
  SCKR.core.ui.closeSheet();
  SCKR.fahrtenbuch.render.settings();
  SCKR.core.ui.toast("BOOT AKTUALISIERT");
};

SCKR.fahrtenbuch.deleteBoat = async function(id) {
  if(!confirm("Boot loeschen?")) return;
  var st = SCKR.fahrtenbuch.state;
  st.boats = st.boats.filter(function(x){ return x.id !== id; });
  await SCKR.core.storage.set("boats", st.boats);
  SCKR.core.ui.closeSheet();
  SCKR.fahrtenbuch.render.settings();
  SCKR.core.ui.toast("GELOESCHT");
};

SCKR.fahrtenbuch.selectBoatChip = function(el, id) {
  var chips = document.querySelectorAll(".boat-chip");
  for(var i=0;i<chips.length;i++) chips[i].classList.remove("sel");
  el.classList.add("sel");
  SCKR.fahrtenbuch.state.selectedBoatId = id;
  var st = SCKR.fahrtenbuch.state;
  var b = null;
  for(var j=0;j<st.boats.length;j++) if(st.boats[j].id===id) { b = st.boats[j]; break; }
  if(!b) return;
  // Update read-only displays
  var upd = function(id, v) { var e=document.getElementById(id); if(e) e.textContent=v; };
  upd("nt-cls-disp", b.boatClass||"-");
  upd("nt-sn-disp", b.sailNumber||"-");
  upd("nt-yn-disp", b.name);
  var cat = document.getElementById("nt-cat");
  if(cat) cat.value = b.category;
};

SCKR.fahrtenbuch.confirmStart = function() {
  var st = SCKR.fahrtenbuch.state;
  var b = SCKR.fahrtenbuch.getActiveBoat();
  if(!b) { SCKR.core.ui.toast("KEIN BOOT GEWAEHLT"); return; }
  var wx = st.currentWeather || {};
  SCKR.fahrtenbuch.startTracking({
    category: (document.getElementById("nt-cat")||{}).value||b.category,
    boatId: b.id,
    boatClass: b.boatClass,
    sailNumber: b.sailNumber,
    yachtName: b.name,
    description: (document.getElementById("nt-desc")||{}).value||"",
    isCommunity: SCKR.core.ui.swVal("nt-comm"),
    hasRegattaFn: SCKR.core.ui.swVal("nt-regfn"),
    windDir: wx.windDir||"",
    windForce: wx.windForce||"",
    cloudiness: wx.cloudiness||""
  });
};

/* -- Manual Trip -- */
SCKR.fahrtenbuch.openManual = function() {
  var st = SCKR.fahrtenbuch.state;
  var esc = SCKR.core.fmt.esc;
  if(st.boats.length === 0) { SCKR.core.ui.toast("BITTE ZUERST EIN BOOT ANLEGEN"); SCKR.core.goto("settings"); return; }
  var b = SCKR.fahrtenbuch.getActiveBoat() || st.boats[0];
  st.selectedBoatId = b.id;
  var today = new Date().toISOString().slice(0,10);

  var boatChips = "";
  for(var i=0;i<st.boats.length;i++) {

SCKR.fahrtenbuch.saveManual = async function() {
  var w = SCKR.fahrtenbuch.weather.readFromFields();
  var b = SCKR.fahrtenbuch.getActiveBoat() || {};
  var t = SCKR.fahrtenbuch.newTrip({
    date: (document.getElementById("mt-date")||{}).value,
    category: (document.getElementById("mt-cat")||{}).value,
    sailKm: +(document.getElementById("mt-sk")||{}).value||0,
    sailSm: +(document.getElementById("mt-ss")||{}).value||0,
    motorKm: +(document.getElementById("mt-mk")||{}).value||0,
    motorSm: +(document.getElementById("mt-ms")||{}).value||0,
    bridges: SCKR.core.ui.stpVal("mt-br"),
    locks: SCKR.core.ui.stpVal("mt-lk"),
    fernKm: +(document.getElementById("mt-fk")||{}).value||0,
    description: (document.getElementById("mt-desc")||{}).value||"",
    isTrailered: SCKR.core.ui.swVal("mt-tr"),
    isCommunity: SCKR.core.ui.swVal("mt-cm"),
    hasRegattaFn: SCKR.core.ui.swVal("mt-rf"),
    boatId: b.id||"",
    boatClass: b.boatClass||"",
    sailNumber: b.sailNumber||"",
    yachtName: b.name||"",
    windDir: w.windDir,
    windForce: w.windForce,
    cloudiness: w.cloudiness
  });
  if(!w.windDir) {
    SCKR.fahrtenbuch.fetchTripWeather(t, function(u){ if(u) SCKR.fahrtenbuch.saveTrip(u); });
  }
  await SCKR.fahrtenbuch.saveTrip(t);
  SCKR.core.ui.closeSheet();
  SCKR.core.ui.toast("FAHRT GESPEICHERT");
  SCKR.core.goto("trips");
};

SCKR.fahrtenbuch._detId = null;

SCKR.fahrtenbuch.openDetail = function(id) {
  var st = SCKR.fahrtenbuch.state;
  var esc = SCKR.core.fmt.esc;
  SCKR.fahrtenbuch._detId = id;
  var t = null;
  for(var i=0;i<st.trips.length;i++) if(st.trips[i].id===id) { t = st.trips[i]; break; }
  if(!t) return;

  // Auto-fetch weather if missing
  if(!t.windDir && t.date) {
    SCKR.fahrtenbuch.fetchTripWeather(t, function(updated) {
      if(updated) {
        SCKR.fahrtenbuch.saveTrip(updated);
        if(SCKR.fahrtenbuch._detId === id) SCKR.fahrtenbuch.openDetail(id);
      }
    });
  }

  var infraList = "";

    for(var j=0;j<t.infraEvents.length;j++) {

SCKR.fahrtenbuch.saveDetail = async function() {
  var st = SCKR.fahrtenbuch.state;
  var t = null;
  for(var i=0;i<st.trips.length;i++) if(st.trips[i].id===SCKR.fahrtenbuch._detId) { t = st.trips[i]; break; }
  if(!t) return;
  var w = SCKR.fahrtenbuch.weather.readFromFields();
  t.date = (document.getElementById("dt-date")||{}).value||t.date;
  t.description = (document.getElementById("dt-desc")||{}).value||"";
  t.category = (document.getElementById("dt-cat")||{}).value||t.category;
  t.boatClass = (document.getElementById("dt-cls")||{}).value||"";
  t.sailNumber = (document.getElementById("dt-sn")||{}).value||"";
  t.yachtName = (document.getElementById("dt-yn")||{}).value||"";
  t.sailKm = +(document.getElementById("dt-sk")||{}).value||0;
  t.sailSm = +(document.getElementById("dt-ss")||{}).value||0;
  t.motorKm = +(document.getElementById("dt-mk")||{}).value||0;
  t.motorSm = +(document.getElementById("dt-ms")||{}).value||0;
  t.fernKm = +(document.getElementById("dt-fk")||{}).value||0;
  t.bridges = SCKR.core.ui.stpVal("dt-br");
  t.locks = SCKR.core.ui.stpVal("dt-lk");
  t.isTrailered = SCKR.core.ui.swVal("dt-tr");
  t.isCommunity = SCKR.core.ui.swVal("dt-cm");
  t.hasRegattaFn = SCKR.core.ui.swVal("dt-rf");
  t.windDir = w.windDir;
  t.windForce = w.windForce;
  t.cloudiness = w.cloudiness;
  t.notes = (document.getElementById("dt-notes")||{}).value||"";
  var stt = (document.getElementById("dt-st")||{}).value;
  var ett = (document.getElementById("dt-et")||{}).value;
  if(stt) t.startTime = new Date(t.date+"T"+stt+":00").toISOString();
  if(ett) t.endTime = new Date(t.date+"T"+ett+":00").toISOString();
  t.lastEdited = new Date().toISOString();
  await SCKR.fahrtenbuch.saveTrip(t);
  SCKR.core.ui.closeSheet();
  SCKR.core.ui.toast("GESPEICHERT - "+Math.round(SCKR.fahrtenbuch.points.trip(t))+" PKT");
  SCKR.fahrtenbuch.render.trips();
};

SCKR.fahrtenbuch.removeInfra = function(tripId, infraId) {
  var st = SCKR.fahrtenbuch.state;
  var t = null;
  for(var i=0;i<st.trips.length;i++) if(st.trips[i].id===tripId) { t = st.trips[i]; break; }
  if(!t) return;
  t.infraEvents = t.infraEvents.filter(function(e){ return e.id !== infraId; });
  t.bridges = t.infraEvents.filter(function(e){return e.type==="Bruecke";}).length;
  t.locks = t.infraEvents.filter(function(e){return e.type==="Schleuse";}).length;
  SCKR.fahrtenbuch.saveTrip(t).then(function(){ SCKR.fahrtenbuch.openDetail(tripId); });
};

SCKR.fahrtenbuch.confirmDelTrip = function(id) {
  if(!confirm("Diese Fahrt wirklich loeschen?")) return;
  SCKR.fahrtenbuch.deleteTrip(id).then(function(){
    SCKR.core.ui.closeSheet();
    SCKR.core.ui.toast("GELOESCHT");
    SCKR.fahrtenbuch.render.trips();
  });
};

SCKR.fahrtenbuch.rerunOSM = function(id) {
  var st = SCKR.fahrtenbuch.state;
  var t = null;
  for(var i=0;i<st.trips.length;i++) if(st.trips[i].id===id) { t = st.trips[i]; break; }
  if(!t) return;
  SCKR.core.ui.toast("OSM WIRD ABGEFRAGT...");
  SCKR.fahrtenbuch.detectOSM(t).then(function(){
    SCKR.fahrtenbuch.saveTrip(t).then(function(){ SCKR.fahrtenbuch.openDetail(id); });
  });
};

SCKR.fahrtenbuch.clearAll = async function() {
